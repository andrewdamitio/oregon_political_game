/* ============================================================
   ISSUE WEB — Democracy-style bubble map. Every metric, indicator,
   enacted policy, agency, and active crisis is a node; hover any
   bubble to light up its actual engine connections (green = pushes
   the target the good way, red = the bad way, blue = derived input).
   Click any bubble to open its page.
   ============================================================ */
function buildWebEdges(){
  const E=[];
  const goodFor=(mk,v)=>{const m=METRICS[mk];return m&&m.invert? v<0 : v>0;};
  for(const id in POLICIES){
    const p=POLICIES[id];
    for(const k in METRICS){const e=policyEffect(p,k); if(Math.abs(e)>0.25)E.push({a:"p_"+id,b:"m_"+k,good:goodFor(k,e),w:Math.abs(e)});}
    for(const ik in (p.indicatorEffects||{})){const v=p.indicatorEffects[ik]*effLevelOf(p); if(Math.abs(v)>0.5)E.push({a:"p_"+id,b:"i_"+ik,good:v>0,w:Math.abs(v)});}
  }
  for(const id in AGENCIES){
    const ag=AGENCIES[id];
    for(const k in (ag.effects||{})){const v=effExpr(ag.effects[k],(ag.funding??0.5),"a:"+id+":"+k); if(Math.abs(v)>0.25)E.push({a:"a_"+id,b:"m_"+k,good:goodFor(k,v),w:Math.abs(v)});}
    for(const ik in (ag.indicatorEffects||{})){const v=ag.indicatorEffects[ik]*(ag.funding??0.5); if(Math.abs(v)>0.5)E.push({a:"a_"+id,b:"i_"+ik,good:v>0,w:Math.abs(v)});}
    for(const k in (ag.loggingEffects||{})){const v=effExpr(ag.loggingEffects[k],(ag.logging??0.5),"a:"+id+":log:"+k); if(Math.abs(v)>0.25)E.push({a:"a_"+id,b:"m_"+k,good:goodFor(k,v),w:Math.abs(v)});}
    for(const ik in (ag.loggingIndicatorEffects||{})){const v=ag.loggingIndicatorEffects[ik]*(ag.logging??0.5); if(Math.abs(v)>0.5)E.push({a:"a_"+id,b:"i_"+ik,good:v>0,w:Math.abs(v)});}
  }
  for(const L of METRIC_LINKS){
    const v=(METRICS[L.from].value-L.ref)*L.coef;
    E.push({a:"m_"+L.from,b:"m_"+L.to,good:goodFor(L.to,v!==0?v:L.coef),w:Math.max(0.4,Math.abs(v))});
  }
  for(const sid in GAME.activeSituations){
    const st=SITUATIONS[sid]; if(!st)continue;
    for(const k in (st.metricEffect||{}))E.push({a:"s_"+sid,b:"m_"+k,good:goodFor(k,st.metricEffect[k]),w:Math.abs(st.metricEffect[k])});
    for(const ik in (st.indicatorEffect||{}))E.push({a:"s_"+sid,b:"i_"+ik,good:st.indicatorEffect[ik]>0,w:Math.abs(st.indicatorEffect[ik])/3});
  }
  for(const iid in INDICATORS){
    const ind=INDICATORS[iid];
    for(const k in (ind.feedback||{})){const v=(ind.value-50)*ind.feedback[k];E.push({a:"i_"+iid,b:"m_"+k,good:goodFor(k,v!==0?v:ind.feedback[k]),w:Math.max(0.3,Math.abs(v))});}
  }
  for(const k in LANDUSE.effects){const v=LANDUSE.effects[k][LANDUSE.index]; if(Math.abs(v)>0.3)E.push({a:"landuse",b:"m_"+k,good:goodFor(k,v),w:Math.abs(v)});}
  // indicator derive inputs (hand-mapped to the formulas)
  const DD={downtown:["m_homelessness","m_propertyCrime","m_violentCrime","m_health"],
    inMigration:["m_unemployment","m_homelessness","m_environment","i_downtown"],
    businessClimate:["m_taxBurden","m_gasPrice","m_propertyCrime","m_violentCrime","i_inMigration","m_education"],
    tourism:["m_environment","i_downtown"],
    taxGrievance:["m_taxBurden","m_gasPrice"],
    housingAffordability:["m_homelessness","m_inequality","m_disposableIncome"],
    ruralAlienation:["m_loggingRate","m_taxBurden","m_gasPrice"],
    justiceEffectiveness:["p_policing","a_judiciary","a_corrections"],
    transportFunding:["p_gasTax","p_vehicleReg","p_evFee"]};
  for(const iid in DD)for(const src of DD[iid])E.push({a:src,b:"i_"+iid,neutral:true,w:0.5});
  return E;
}

  svg+=`</svg>`;
  main.innerHTML=`<div class="sectionhdr">Issue Web</div>
    <div class="sectionsub">The whole simulation as one map. Hover any bubble to light up everything it pushes and everything pushing it — <span style="color:var(--good)">green</span> helps, <span style="color:var(--clay)">red</span> hurts, <span style="color:var(--slate-blue)">blue</span> feeds a derived gauge. Click to open. Inner ring: state statistics · middle: derived gauges &amp; active crises · outer: your policies &amp; agencies.</div>
    <div class="websearch"><input type="search" id="webSearch" placeholder="Search policies, metrics, agencies…" autocomplete="off"></div>
    <div class="webwrap">${svg}</div>`;
  // interactions
  const svgEl=document.getElementById("webSvg");
  if(!svgEl||!svgEl.querySelectorAll)return;
  const edgeEls=Array.from(svgEl.querySelectorAll(".webedge")), nodeEls=Array.from(svgEl.querySelectorAll(".webnode"));
  nodeEls.forEach(g=>{
    const id=g.dataset.node;
    g.addEventListener("mouseenter",()=>{
      const hot=new Set([id]);
      edgeEls.forEach(p=>{const on=p.dataset.a===id||p.dataset.b===id; p.classList.toggle("hot",on); if(on){hot.add(p.dataset.a);hot.add(p.dataset.b);}});
      nodeEls.forEach(n2=>n2.classList.toggle("dim",!hot.has(n2.dataset.node)));
      svgEl.classList.add("focus");
    });
    g.addEventListener("mouseleave",()=>{
      edgeEls.forEach(p=>p.classList.remove("hot"));
      nodeEls.forEach(n2=>n2.classList.remove("dim"));
      svgEl.classList.remove("focus");
    });
    g.addEventListener("click",()=>openDetail(id));
  });
  // search bar — highlight matching nodes, dim the rest
  const searchEl=document.getElementById("webSearch");
  if(searchEl){
    searchEl.addEventListener("input",()=>{
      const q=searchEl.value.trim().toLowerCase();
      if(!q){
        nodeEls.forEach(n=>n.classList.remove("searchhit","dim"));
        edgeEls.forEach(p=>p.classList.remove("hot"));
        svgEl.classList.remove("focus");
        return;
      }
      svgEl.classList.add("focus");
      const hitIds=new Set();
      nodeEls.forEach(g=>{
        const id=g.dataset.node, n=nodes[id];
        const match=n.label.toLowerCase().includes(q)||id.toLowerCase().includes(q);
        g.classList.toggle("searchhit",match);
        g.classList.toggle("dim",!match);
        if(match)hitIds.add(id);
      });
      edgeEls.forEach(p=>{
        const on=hitIds.has(p.dataset.a)||hitIds.has(p.dataset.b);
        p.classList.toggle("hot",on);
      });
    });
  }
}
function renderRailVoters(){
  const el=document.getElementById("railVoters");
  if(!el)return;
  const ids=Object.keys(SIMULANTS).sort((a,b)=>SIMULANTS[b].approval-SIMULANTS[a].approval);
  el.innerHTML=ids.map(sid=>{
    const s=SIMULANTS[sid];
    const ap=Math.round(s.approval);
    const col=s.approval>=55?'var(--good)':s.approval>=45?'var(--warn)':'var(--bad)';
    const share=Math.round(s.size*100);
    return `<div class="vbloc" data-detail="v_${sid}">
      <div class="vbloc-top"><span class="vbloc-name">${s.name}</span><span class="vbloc-pct" style="color:${col}">${ap}%</span></div>
      <div class="vbloc-bar"><i style="width:${clamp(ap,0,100)}%;background:${col}"></i><span class="vbloc-mid"></span></div>
    </div>`;
  }).join("");
  el.querySelectorAll('[data-detail]').forEach(b=>b.addEventListener('click',()=>openDetail(b.dataset.detail)));
}
function renderDilemma(){
  const modal=document.getElementById("dilemmaModal"), card=document.getElementById("dilemmaCard");
  if(!modal||!card)return;
  // effects splash after a decision
  if(!GAME.pendingDilemma && GAME.lastDilemmaResult){
    const r=GAME.lastDilemmaResult;
    let h=`<div class="dilemma-icon">${r.icon}</div><h2>${r.title}</h2>`;
    if(r.desc)h+=`<div class="dilemma-text">${r.desc}</div>`;
    h+=`<div class="splash-choice">${r.noChoice?r.choice:'You chose: <b>'+r.choice+'</b>'}</div>`;
    if(r.fx.length){
      h+=`<div class="splash-label">What it set in motion</div><div class="splash-fx">`;
      // group: capital + metric/indicator pushes vs voter-bloc reactions
      const sortFx=r.fx.slice().sort((a,b)=>Math.abs(b.val)-Math.abs(a.val));
      for(const f of sortFx){
        const good=f.val>0, cls=f.kind==="v"?"vbloc":(f.kind==="cap"?"cap":"stat");
        const arrow=good?"▲":"▼";
        let line=f.who;
        if((f.kind==="m"||f.kind==="i"||f.kind==="cap")&&f.label&&f.label!==f.who)line=f.who;
        h+=`<div class="splash-row ${good?'pos':'neg'}"><span class="srow-who">${f.who}</span>
          <span class="srow-tag">${f.kind==="v"?"voters":f.kind==="cap"?"capital":f.kind==="i"?"gauge":"statistic"}</span>
          <span class="srow-val">${arrow} ${good?'+':''}${f.val.toFixed(f.kind==="cap"?0:1)}</span></div>`;
      }
      h+=`</div><div class="splash-foot">Voter reactions fade gradually over the coming quarters; statistics and gauges shift over the same window.</div>`;
    } else {
      h+=`<div class="splash-foot">No immediate measurable effects.</div>`;
    }
    h+=`<button class="splash-ok" id="splashOk">Continue ▸</button>`;
    card.innerHTML=h;
    modal.classList.remove("hidden");
    const ok=document.getElementById("splashOk");
    if(ok)ok.addEventListener('click',()=>{GAME.lastDilemmaResult=null;render();});
    return;
  }
  if(!GAME.pendingDilemma){modal.classList.add("hidden");return;}
  const d=DILEMMAS[GAME.pendingDilemma];
  let h=`<div class="dilemma-icon">${d.icon}</div><h2>${d.title}</h2>
    <div class="dilemma-text">${d.text}</div><div class="dilemma-opts">`;
  d.options.forEach((o,i)=>{
    h+=`<button class="dilemma-opt" data-opt="${i}"><span class="do-label">${o.label}</span><span class="do-sub">${o.text}</span></button>`;
  });
  h+=`</div><div class="dilemma-foot">You must decide before the quarter ends. There is no clean choice — both sides will remember.</div>`;
  card.innerHTML=h;
  modal.classList.remove("hidden");
  card.querySelectorAll('[data-opt]').forEach(b=>b.addEventListener('click',()=>resolveDilemma(+b.dataset.opt)));
}
function render(){
  renderHUD();renderSidebar();renderRailVoters();
  // scroll to top on every view switch so the player doesn't land mid-page
  if(main)main.scrollTop=0;
  window.scrollTo(0,0);
  // the Voter Blocs panel belongs to the Governing Board (and its detail pages);
  // hide it on the other tabs, which have their own full-width content
  const showVoters = currentView==="board" || currentView==="detail";
  const wrap=document.getElementById("wrap");
  if(wrap)wrap.classList.toggle("novoters",!showVoters);
  ({board:renderBoard,detail:renderDetail,policies:renderPolicies,voters:renderVoters,budget:renderBudget,web:renderWeb,campaign:renderCampaign}[currentView]||renderBoard)();
  renderDilemma();
}
document.querySelectorAll('nav.rail button').forEach(b=>b.addEventListener('click',()=>{
  settlePending();
  document.querySelectorAll('nav.rail button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');currentView=b.dataset.view;render();
}));
document.getElementById("endTurn").addEventListener('click',endTurn);
// sidebar toggle — drawer on mobile, collapse on desktop
const wrapEl=document.getElementById("wrap"), toggleBtn=document.getElementById("asideToggle"), scrim=document.getElementById("drawerScrim");
const isMobile=()=>window.matchMedia("(max-width:820px)").matches;
function updateToggleGlyph(){
  if(isMobile())toggleBtn.textContent=wrapEl.classList.contains("drawer-open")?"✕":"☰";
  else toggleBtn.textContent=wrapEl.classList.contains("collapsed")?"❮":"❯";
}
toggleBtn.addEventListener('click',()=>{
  if(isMobile())wrapEl.classList.toggle("drawer-open");
  else wrapEl.classList.toggle("collapsed");
  updateToggleGlyph();
});
scrim.addEventListener('click',()=>{wrapEl.classList.remove("drawer-open");updateToggleGlyph();});
window.addEventListener('resize',updateToggleGlyph);
updateToggleGlyph();
// make approval & balance HUD stats open their detail history
document.getElementById("hudApproval").parentElement.style.cursor="pointer";
document.getElementById("hudApproval").parentElement.addEventListener('click',()=>openDetail("approval"));
document.getElementById("hudBudget").parentElement.style.cursor="pointer";
document.getElementById("hudBudget").parentElement.addEventListener('click',()=>{currentView="budget";detailKey=null;render();});
// seed chronic Oregon conditions the governor inherits
for(const sid in SITUATIONS){
  if(SITUATIONS[sid].startActive){GAME.activeSituations[sid]=true;GAME.situationAge[sid]=0;}
}
// existing law starts fully implemented
// some catalog entries reflect CURRENT Oregon law — they start already on
// the board. Move any CATALOG policy flagged enacted into POLICIES.
for(const id in CATALOG){
  if(CATALOG[id].enacted){POLICIES[id]=CATALOG[id]; delete CATALOG[id];}
}
for(const id in POLICIES){POLICIES[id]._id=id;POLICIES[id].eff=policyLevel(POLICIES[id]);}
for(const id in CATALOG)CATALOG[id]._id=id;
for(const id in SIMULANTS)SIMULANTS[id].id=id;
// build the simulated electorate and pre-roll to equilibrium
buildVoters();
for(let pr=0;pr<10;pr++){tickMembership();tickVoterApproval();}
// seed indicators from the starting state (derive once so they reflect inherited crises)
for(const id in INDICATORS)INDICATORS[id].value=INDICATORS[id].derive();
for(const id in INDICATORS)INDICATORS[id].value=INDICATORS[id].derive(); // 2nd pass for cross-deps
pushHistory(); // seed turn 0
render();
</script>
