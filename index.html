/* NATIONAL_MOOD — a persistent background variable doing a random walk.
   Represents the national political environment (your party's standing
   nationally). Ranges -10..+10; shifts every bloc's approval, weighted by
   how partisan-aligned the bloc is with you. */
const NATIONAL_MOOD={ value:0, drift:0 };

const GAME={
  turn:0, startYear:2025, capital:40, capitalPerTurn:6,
  lastMargin:0, crisesResolved:0, uturnCount:0, mandateShock:0,
  campaign:{effort:{},promises:[],pool:10}, activePromises:[], campaignDone:false, skipReport:false,
  // ---- ground game: ongoing campaigning, independent of governing capital ----
  // campEnergy refills each quarter; perception/turnout boosts decay over time;
  // fatigue rises when you over-campaign a bloc, lowering future success odds
  campEnergy:4, campEnergyMax:4,
  ground:{perception:{}, turnout:{}, fatigue:{}, fatigueAge:{}}, campLog:[],
  termLengthTurns:16, midtermTurn:8, term:1,
  activeSituations:{}, situationAge:{}, log:[], prevMetrics:{}, lastBalance:0, gameOver:false, pending:null, pendingLog:null, fading:{}, effSm:{}, grudges:[], enactedAt:{}, pendingDilemma:null, dilemmaCooldown:{}, lastDilemmaTurn:-9, lastDilemmaResult:null,
  // ---- FISCAL MODEL (research: income-tax dependence + kicker + reserves) ----
  rainyDay:1.87,        // Rainy Day Fund ($B) — real 2023-25 end balance
  eduStability:1.0,     // Education Stability Fund ($B)
  structuralDebt:0,     // accumulated unresolved deficit ($B) — accrues when reserves are exhausted
  deficitStreak:0,      // consecutive quarters carrying a gap after reserves are drained
  econCycle:0,          // -1 deep recession .. +1 boom; random walk each quarter
  marketLevel:0,        // equity-market sub-variable; swings high-earner cap-gains
  persRate:5.26,        // PERS employer contributions ($B/biennium-equiv), escalating
  fedIndex:1.0,         // federal-funds multiplier; shocked by federal events
  pendingKicker:0,      // kicker owed, paid out next cycle
  history:{}, // { metricKey: [{turn,value}], policyId: [{turn,level,cost}], approval:[...] }
};
function pushHistory(){
  const h=GAME.history;
  const rec=(key,obj)=>{(h[key]=h[key]||[]).push(obj);};
  for(const k in METRICS)rec("m_"+k,{turn:GAME.turn,value:METRICS[k].value});
  for(const id in POLICIES){
    const p=POLICIES[id];
    rec("p_"+id,{turn:GAME.turn,level:policyLevel(p),cost:Math.abs(policyNetCost(p))});
  }
  for(const id in AGENCIES){
    const a=AGENCIES[id];
    rec("a_"+id,{turn:GAME.turn,level:a.funding,cost:agencySpend(a)});
  }
  for(const id in SIMULANTS){
    rec("v_"+id,{turn:GAME.turn,value:SIMULANTS[id].approval});
    rec("mem_"+id,{turn:GAME.turn,value:SIMULANTS[id].size*100});
  }
  rec("intention",{turn:GAME.turn,value:votingIntention()});
  for(const id in INDICATORS)rec("i_"+id,{turn:GAME.turn,value:INDICATORS[id].value});
  rec("approval",{turn:GAME.turn,value:overallApproval()});
  rec("nationalMood",{turn:GAME.turn,value:NATIONAL_MOOD.value});
  rec("balance",{turn:GAME.turn,value:budgetBalance().balance});
}

const dot=(a,b)=>AXES.reduce((s,k)=>s+(a[k]||0)*(b[k]||0),0);
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const turnLabel=t=>"Q"+(t%4+1)+" "+(GAME.startYear+Math.floor(t/4));
const agencySpend=a=>a.costMin+(a.costFull-a.costMin)*(a.funding??0.5);

/* human-readable real-world value of a policy's current setting:
   tax sliders show the actual RATE (e.g. "9.9%"), spending sliders and
   intensity dials show actual DOLLARS (e.g. "$3.30B/yr"). */
function policyRealLabel(p){
  if(p.real){
    const v=p.real.min+(p.real.max-p.real.min)*(p.mechanic==="intensity"?p.intensity:p.value);
    return v.toFixed(p.real.decimals)+p.real.unit;
  }
  if(p.mechanic==="slider"||p.mechanic==="allocation"){
    if(p.costFull)return "$"+(p.costFull*p.value).toFixed(2)+"B/yr";
    return Math.round(p.value*100)+"%";
  }
  if(p.mechanic==="intensity"&&p.enabled){
    if(p.costFull)return "$"+(p.costFull*p.intensity).toFixed(2)+"B/yr";
    return Math.round(p.intensity*100)+"%";
  }
  return "";
}
function policyLevel(p){
  if(!p)return 0;
  if(p.mechanic==="law")return 1;
  if(p.mechanic==="slider")return p.value;
  if(p.mechanic==="allocation")return p.value;
  if(p.mechanic==="intensity")return p.enabled?p.intensity:0;
  if(p.mechanic==="toggle")return p.enabled?1:0;
  if(p.mechanic==="tier")return p.tierIndex/(p.tiers.length-1);
  return 0;
}
function policyNetCost(p){
  if(!p)return 0;
  if(p.revenueFull)return -(p.value*p.revenueFull);
  if(p.revenue!==undefined){
    // slider revenue scales with value; law is always in force; toggle/intensity gate on enabled
    if(p.mechanic==="slider")return -(p.revenue*p.value);
    if(p.mechanic==="law")return -p.revenue;
    return -(p.enabled?p.revenue:0);
  }
  if(p.mechanic==="slider")return (p.costFull||0)*p.value;
  if(p.mechanic==="allocation")return (p.costFull||0)*p.value;
  if(p.mechanic==="intensity")return p.enabled?(p.costFull||0)*p.intensity:0;
  if(p.mechanic==="law")return (p.costFull||0);
  if(p.mechanic==="toggle")return p.enabled?(p.costFull||0):0;
  if(p.mechanic==="tier")return p.costByTier?p.costByTier[p.tierIndex]:0;
  return 0;
}
/* combined per-metric effect of a policy (handles allocation channels).
   Scaled by government digitization efficacy — low state capacity means
   policies deliver weaker outcomes than their nominal effect. */
/* phase-in: policies don't hit at full strength overnight. p.eff is the
   EFFECTIVE level, easing toward the set level each quarter at a speed set
   by p.phaseIn (quarters to fully implement; default 5, statutes 3, big
   builds longer). Repealed laws keep fading via GAME.fading. */
function policyPhaseQuarters(p){return p.phaseIn||(p.mechanic==="law"?3:5);}
function effLevelOf(p){return p.eff!==undefined?p.eff:policyLevel(p);}
/* D4 effect grammar: an effect value is either a plain number V
   (legacy: V*x) or an object {b, c, i} meaning b + c*sm(x), where
   sm(x) is x smoothed over i turns (D4's per-effect inertia — slow
   structural effects like education lag their cause). Smoothing
   state advances once per turn in tickPhase via tickEffSm(). */
function effExpr(raw,x,key){
  if(typeof raw==="number")return raw*x;
  const sm=(key&&GAME.effSm[key]!==undefined)?GAME.effSm[key]:x;
  return (raw.b||0)+(raw.c||0)*sm;
}
/* severity 0..1: ramps smoothly from the CLEAR threshold (sev→0) through
   the START threshold (sev=0.5) to "deep crisis" (sev=1) — D4's fix for
   situations slamming on at full strength the moment they trigger. */
function sitSeverity(sid){
  const st=SITUATIONS[sid];
  if(!st||!GAME.activeSituations[sid])return 0;
  const w=st.watch;
  if(!w)return 1;                                   // events run at full strength
  const cur=w.metric&&METRICS[w.metric]?METRICS[w.metric].value
    :(w.indicator&&INDICATORS[w.indicator]?INDICATORS[w.indicator].value:50);
  if(w.clearAt===undefined)return 1;
  const span=Math.abs((w.startAt!==undefined?w.startAt:w.clearAt+(w.badHigh?10:-10))-w.clearAt)||10;
  let sev;
  if(w.badHigh)sev=(cur-w.clearAt)/(2*span);
  else sev=(w.clearAt-cur)/(2*span);
  return clamp(sev,0.12,1);
}
function tickEffSm(){
  GAME.effSm=GAME.effSm||{};
  const adv=(raw,x,key)=>{
    if(typeof raw!=="object"||!raw.i)return;
    const cur=GAME.effSm[key]!==undefined?GAME.effSm[key]:x;
    GAME.effSm[key]=cur+(x-cur)/Math.max(1,raw.i);
  };
  for(const id in POLICIES){
    const p=POLICIES[id], x=effLevelOf(p);
    for(const k in (p.effects||{}))adv(p.effects[k],x,"p:"+id+":"+k);
  }
  for(const sid in SITUATIONS){
    const st=SITUATIONS[sid], sev=GAME.activeSituations[sid]?sitSeverity(sid):0;
    for(const k in (st.metricEffect||{}))adv(st.metricEffect[k],sev,"s:"+sid+":"+k);
  }
  for(const id in AGENCIES){
    const ag=AGENCIES[id], x=(ag.funding??0.5);
    for(const k in (ag.effects||{}))adv(ag.effects[k],x,"a:"+id+":"+k);
  }
}
function policyEffect(p,k){
  let raw;
  const eff=effLevelOf(p);
  if(p.mechanic==="allocation"){
    let e=0;
    for(const ch of p.channels)if(ch.effects[k]!==undefined)e+=ch.share*ch.effects[k];
    raw=e*eff;
  } else if(p.mechanic==="tier"&&p.tierEffects){
    // eff is a 0..1 position along the tier axis; lerp adjacent tiers
    const n=p.tiers.length-1, lv=clamp(eff,0,1)*n, lo=Math.floor(lv), hi=Math.min(n,lo+1), f=lv-lo;
    const a=(p.tierEffects[lo]&&p.tierEffects[lo][k])||0, b=(p.tierEffects[hi]&&p.tierEffects[hi][k])||0;
    raw=a+(b-a)*f;
  } else {
    raw=(p.effects&&p.effects[k]!==undefined)?effExpr(p.effects[k],eff,"p:"+(p._id||p.name)+":"+k):0;
  }
  return raw*efficacy();
}
function tickPhase(){
  // Large public unions slow implementation: institutional resistance and bargaining requirements
  const uPhaseSize = SIMULANTS.publicUnions?.size ?? 0.07;
  const phaseFriction = 1 + Math.min(Math.max(0, uPhaseSize - 0.05) * 1.5, 0.22);
  for(const id in POLICIES){
    const p=POLICIES[id], target=policyLevel(p), rate=(1/policyPhaseQuarters(p))/phaseFriction;
    if(p.eff===undefined)p.eff=target;
    if(Math.abs(target-p.eff)<=rate)p.eff=target;
    else p.eff+=Math.sign(target-p.eff)*rate;
  }
  // repealed laws fade out rather than vanishing overnight
  for(const id in GAME.fading){
    const f=GAME.fading[id], rate=1/policyPhaseQuarters(f.pol);
    f.pol.eff=Math.max(0,f.pol.eff-rate);
    if(f.pol.eff<=0.01)delete GAME.fading[id];
  }
}
function policyIdeology(p){
  if(p.mechanic==="tier"&&p.tierIdeology)return p.tierIdeology[p.tierIndex];
  return p.ideology||{};
}
/* metricTarget: the level metric k settles toward. EVERYTHING shapes the
   target — policies, agencies, land use, inter-metric links, active
   situations, and indicator feedback. Effects therefore LEVEL OFF at a
   new equilibrium rather than accumulating forever. (Per-quarter push
   values are divided by the metric's inertia so their steady-state
   magnitude matches their stated size.) */
function metricTarget(k){
  const m=METRICS[k];
  let t=m.eq;
  for(const id in POLICIES)t+=policyEffect(POLICIES[id],k);
  for(const id in GAME.fading)t+=policyEffect(GAME.fading[id].pol,k);
  for(const id in AGENCIES){
    const a=AGENCIES[id];
    if(a.effects&&a.effects[k]!==undefined)t+=effExpr(a.effects[k],(a.funding??0.5),"a:"+id+":"+k);

    if(k==="propertyCrime") t-=served*3;

}

    for(const pid of a.policies){
      const p=POLICIES[pid];
      if(!p||!p.enacted)continue;        // catalog policies not yet enacted contribute nothing
      const c=policyNetCost(p);
      if(c>0)amt+=c;                      // only spending (revenue policies handled in REVENUE)
    }
    // prison population drives corrections costs (the Measure 11 chain:
    // mandatory minimums → incarceration growth → corrections crowd-out)
    if(id==="publicSafety")amt+=Math.max(0,(METRICS.incarcerationRate.value-50))*0.012;
    // weak state capacity inflates administration; a rotting downtown costs policing
    if(id==="debtAdmin"&&INDICATORS.digitization.value<50)amt+=(50-INDICATORS.digitization.value)*0.012;
    if(id==="publicSafety"&&INDICATORS.downtown.value<45)amt+=(45-INDICATORS.downtown.value)*0.008;
    // PERS pension costs crowd debt/admin (research: ~$5.26B→$9.35B/biennium,
    // shown here as a per-quarter slice escalating over the game)
    if(id==="debtAdmin")amt+=(GAME.persRate-5.26)*0.25;
    // more biking & transit means fewer lane-miles to build and maintain —
    // every point of mode share above baseline trims the transport budget
    if(id==="natResources")amt-=Math.max(0,(METRICS.transitShare.value-8))*0.012;
    // federal Medicaid match: dollars in (revenue) are matched by program
    // spending out, so they're roughly net-neutral except when shocked
    if(id==="humanServices")amt+=6.5*GAME.fedIndex;
    // active crises inflate program costs (caseloads, response, recovery)
    for(const sid in GAME.activeSituations){
      const s=SITUATIONS[sid];
      if(s&&s.costEffect&&s.costEffect[id]!==undefined)amt+=s.costEffect[id]*sitSeverity(sid);
    }
    out[id]=amt;
  }
  return out;
}
function budgetBalance(){
  const rev=revenueBySource(), spd=spendingByArea();
  let revenue=Object.values(rev).reduce((a,b)=>a+b,0);
  const spend=Object.values(spd).reduce((a,b)=>a+b,0);
  // pending kicker refunds walk out the door this cycle
  if(GAME.pendingKicker>0)revenue-=GAME.pendingKicker;
  return {revenue,spend,balance:revenue-spend};
}
/* end-of-quarter fiscal settlement: the kicker drains surpluses above the
   2% line (research: entire surplus refunded, not just the excess), reform
   redirects it, and reserves/deficits are reconciled. */
function settleFiscal(){
  const {balance}=budgetBalance();
  GAME.pendingKicker=0;        // consumed this cycle
  const {revenue,spend}=budgetBalance();
  const surplusPct=(revenue-spend)/Math.max(1,spend);
  // quarterly interest on structural debt (~4%/yr = 1%/qtr)
  if((GAME.structuralDebt||0)>0)
    GAME.structuralDebt=+(GAME.structuralDebt*1.01).toFixed(2);
  if(balance>0){
    GAME.deficitStreak=0;
    let surplus=balance;
    // pay down structural debt before triggering kicker or filling reserves
    if((GAME.structuralDebt||0)>0){
      const paydown=Math.min(surplus,GAME.structuralDebt);
      GAME.structuralDebt=+(Math.max(0,GAME.structuralDebt-paydown)).toFixed(2);
      surplus-=paydown;
      if(GAME.structuralDebt<0.01){
        GAME.structuralDebt=0;
        GAME.log.push("💳 Structural debt fully cleared");
      }
    }
    if(surplus>0.01){
      if(surplusPct>=0.02 && !POLICIES.kickerReform){
        GAME.pendingKicker=surplus;
        GAME.log.push("💸 Kicker triggered — $"+surplus.toFixed(2)+"B refunds to taxpayers next quarter");
      } else {
        const toRD=surplus*0.6, toEd=surplus*0.4;
        GAME.rainyDay+=toRD; GAME.eduStability+=toEd;
        if(POLICIES.kickerReform&&surplusPct>=0.02)GAME.log.push("🏦 Kicker reform: $"+surplus.toFixed(2)+"B banked to reserves & schools");
      }
    }
  } else if(balance<0){
    // draw down reserves first (balanced-budget requirement)
    let gap=-balance;
    const fromRD=Math.min(GAME.rainyDay,gap); GAME.rainyDay-=fromRD; gap-=fromRD;
    if(gap>0){const fromEd=Math.min(GAME.eduStability,gap);GAME.eduStability-=fromEd;gap-=fromEd;}
    if(gap>0.05){
      // reserves exhausted — deficit accrues as structural debt; lighter immediate cuts
      // since the debt mechanic now carries the long-term pressure
      GAME.structuralDebt=+((GAME.structuralDebt||0)+gap).toFixed(2);
      GAME.deficitStreak=(GAME.deficitStreak||0)+1;
      const bite=Math.min(gap,2);
      GAME.log.push("🔴 Deficit $"+gap.toFixed(2)+"B — borrowed against future budgets (structural debt: $"+GAME.structuralDebt.toFixed(1)+"B)");
      METRICS.education.value=clamp(METRICS.education.value-bite*0.4,0,100);
      METRICS.health.value=clamp(METRICS.health.value-bite*0.3,0,100);
      GAME.capital=clamp(GAME.capital-Math.min(gap*2,8),0,100);
    }
  }
}
/* Election with differential turnout and third-party dynamics.
   Each voter turns out by enthusiasm; votes YES for you iff approval>50.
   Disaffected voters who lean to an ideological pole may defect to a third
   party. Under RCV those third-party votes are viable (and their second
   preferences can flow back), so they mostly cost you nothing if you're the
   lesser evil; WITHOUT RCV they spoiler — splitting your coalition and
   handing victory to the challenger. */
function runElection(){
  const rcv=POLICIES.rankedChoice&&POLICIES.rankedChoice.enabled;
  let yes=0,no=0,third=0,tot=0;
  const camp=GAME.campaign||{};
  for(const v of VOTERS){
    let app=v.approval+(Math.random()-0.5)*4;
    // campaign effort nudges turnout/approval among targeted blocs
    let mob=0;
    if(camp.effort)for(const sid in camp.effort){ if((v.m[sid]||0)>0.3){ app+=camp.effort[sid]*2.2*(v.m[sid]); mob+=camp.effort[sid]*0.05*(v.m[sid]); } }
    // ongoing ground game: accumulated perception lifts the vote, turnout boosts
    // lift election-day participation — weighted by how strongly the voter
    // belongs to each targeted bloc
    for(const sid in GAME.ground.perception){ const w=v.m[sid]||0; if(w>0.2)app+=GAME.ground.perception[sid]*w*0.5; }
    for(const sid in GAME.ground.turnout){ const w=v.m[sid]||0; if(w>0.2)mob+=GAME.ground.turnout[sid]*w; }
    const t=clamp(turnoutProb(v)+mob,0.03,0.98)*(0.85+Math.random()*0.3);
    tot+=t;
    if(app>50){ yes+=t; continue; }
    // unhappy with you — do they defect to a third party, stay home, or back the challenger?
    const pole=Math.max(Math.abs(v.econ),Math.abs(v.social));         // ideological intensity
    const disaffection=clamp((50-app)/22,0,1);
    let thirdPull=pole*disaffection*(rcv?1.5:0.7);                    // RCV makes 3rd parties viable
    if(thirdPull>0.30+Math.random()*0.35){ third+=t; }                // defects to a third party
    else no+=t;                                                        // backs the challenger
  }
  // Under RCV, a chunk of third-party first-preferences flow back to you on
  // later rounds if you're preferable to the challenger (you're rarely their
  // last choice). Without RCV, third-party votes are simply lost to you.
  let fromThird=0;
  if(rcv&&third>0){ fromThird=third*0.45; yes+=fromThird; }
  const eff=yes+no+(rcv?third-fromThird:third);
  const share=clamp(eff>0?yes/eff:0.5,0,1);
  const turnoutPct=tot/VOTERS.length;
  return {won:share>=0.5, share, approval:overallApproval(), intention:votingIntention(),
          turnout:turnoutPct, thirdShare:tot>0?third/tot:0, rcv};
}

/* ====================== GROUND GAME (ongoing campaigning) ===================
   Every quarter the player has a small pool of campaign energy (separate from
   governing capital) to run targeted pushes at voter blocs. Two kinds:
     • PERSUASION  — tries to lift a bloc's perception of you (approval)
     • MOBILIZATION — tries to lift a bloc's election-day turnout
   Each push has a SUCCESS CHANCE shaped by how favorable the ground is, and by
   FATIGUE (over-campaigning the same bloc makes it harder). Success grants a
   decaying boost; failure wastes the energy AND irritates the bloc — voters
   resent being pandered to — nudging approval down a touch and adding fatigue.
   Boosts decay every quarter, so they must be maintained. */

// success probability for a push of a given kind at a bloc
function campChance(kind, sid){
  const s=SIMULANTS[sid]; if(!s)return 0;
  let base = kind==="persuade" ? 0.62 : 0.66;
  if(kind==="persuade"){
    // easier to move the persuadable middle, harder to flip the hostile or the
    // already-devoted; ideologically intense blocs resist persuasion
    const dist=Math.abs(s.approval-50);
    base -= dist*0.006;                         // far from 50 (love or hate) = harder
    if(s.approval<35) base -= 0.10;             // deeply hostile: very hard
    base -= (s.intensity||0.5-0.5)*0.05;
  } else {
    // mobilization works best where there's latent enthusiasm to tap
    base += (s.approval-50)*0.004;              // friendly blocs turn out easier
    base += ((s.turnout||0.5)<0.5?0.06:-0.03);  // low-turnout blocs have headroom
  }
  base -= (GAME.ground.fatigue[sid]||0)*0.12;   // fatigue from over-campaigning
  return clamp(base, 0.12, 0.92);
}

// run one push; returns {ok, chance, delta, msg}
function campPush(kind, sid){
  if(GAME.campEnergy<1) return null;
  const s=SIMULANTS[sid]; if(!s) return null;
  GAME.campEnergy-=1;
  const chance=campChance(kind,sid);
  const ok=Math.random()<chance;
  const map = kind==="persuade" ? GAME.ground.perception : GAME.ground.turnout;
  let msg, delta=0;
  if(ok){
    delta = kind==="persuade" ? (1.3+Math.random()*0.9) : (0.035+Math.random()*0.03);
    map[sid]=(map[sid]||0)+delta;
    msg=`✓ ${kind==="persuade"?"Persuasion":"Turnout"} push reached ${s.name}`;
  } else {
    // backlash: pandering that misses irritates the bloc
    const back = kind==="persuade" ? -(1.0+Math.random()*1.2) : -(0.5+Math.random()*0.8);
    if(kind==="persuade"){ s.approval=clamp(s.approval+back,0,100); }
    else { GAME.ground.perception[sid]=(GAME.ground.perception[sid]||0)+back*0.5; }
    msg=`✗ ${s.name} resented the ${kind==="persuade"?"messaging":"GOTV pressure"} — it backfired`;
    delta=back;
  }
  GAME.ground.fatigue[sid]=(GAME.ground.fatigue[sid]||0)+1;   // each push tires the bloc
  GAME.ground.fatigueAge[sid]=0;                              // reset cooldown — they were just pressured
  GAME.campLog.unshift({turn:GAME.turn, kind, sid, ok, msg});
  if(GAME.campLog.length>12)GAME.campLog.pop();
  return {ok, chance, delta, msg};
}

// applied each quarter in endTurn: decay boosts & fatigue, refill energy
function tickGroundGame(){
  for(const m of [GAME.ground.perception, GAME.ground.turnout]){
    for(const sid in m){ m[sid]*=0.78; if(Math.abs(m[sid])<0.05)delete m[sid]; }   // boosts fade
  }
  for(const sid in GAME.ground.fatigue){
    const age=(GAME.ground.fatigueAge[sid]||0)+1;
    GAME.ground.fatigueAge[sid]=age;
    const decay=Math.max(0.85-age*0.12, 0.35); // fades faster the longer they've been left alone
    GAME.ground.fatigue[sid]*=decay;
    if(GAME.ground.fatigue[sid]<0.15){delete GAME.ground.fatigue[sid];delete GAME.ground.fatigueAge[sid];}
  }
  GAME.campEnergy=GAME.campEnergyMax;   // refill for the new quarter
}

          <span class="cb2-kind">Mobilize</span><span class="cb2-odds">${mc}%</span></button>
      </div>
      ${(pBoost>0.05||tBoost>0.005)?`<div class="cb2-boosts">${pBoost>0.05?`<span class="cb2-boost good">+${pBoost.toFixed(1)} perception</span>`:``}${tBoost>0.005?`<span class="cb2-boost good">+${Math.round(tBoost*100)} turnout</span>`:``}</div>`:``}
    </div>`;
  }
  h+=`</div>`;

  // recent push results
  if(GAME.campLog.length){
    h+=`<div class="ebgroup-label" style="margin-top:18px">Recent ground-game results</div><div class="camplog">`;
    for(const e of GAME.campLog.slice(0,6))h+=`<div class="camplog-row ${e.ok?'ok':'fail'}">${e.msg}</div>`;
    h+=`</div>`;
  }

  if(isElection)h+=`<div class="campfoot"><button id="campRun" class="enactbtn">Hold the election ▸</button></div>`;
  main.innerHTML=h;

  // wire ground-game pushes
  main.querySelectorAll('[data-push]').forEach(el=>el.addEventListener('click',()=>{
    const r=campPush(el.dataset.push, el.dataset.sid);
    if(r){ GAME.log.push(r.msg); }
    const sy=window.scrollY;
    render();
    window.scrollTo(0,sy);
  }));
  // wire promise toggles
  main.querySelectorAll('[data-prom]').forEach(el=>el.addEventListener('click',()=>{
    const pid=el.dataset.prom, i=c.promises.indexOf(pid);
    if(i>=0)c.promises.splice(i,1); else c.promises.push(pid);
    const sy=window.scrollY;
    render();
    window.scrollTo(0,sy);
  }));
  const runBtn=document.getElementById("campRun");
  if(runBtn)runBtn.onclick=()=>{
    GAME.activePromises=c.promises.map(pid=>({id:pid, madeTerm:GAME.term}));
    GAME.campaignDone=true;
    GAME.campaign={effort:{}, promises:c.promises, pool:10};
    GAME.capitalPerTurn=+(4+INDICATORS.mandate.value/100*9).toFixed(1);
    GAME.capital=clamp(GAME.capital+GAME.capitalPerTurn,0,100);
    GAME.turn++; pushHistory();
    GAME.campaignDone=false;
    render(); showElection(runElection());
  };
}

/* at the start of a new term, judge the promises made last campaign */
function evaluatePromises(){
  if(!GAME.activePromises||!GAME.activePromises.length)return;
  // first pass: classify each promise
  const outcomes={};
  for(const ap of GAME.activePromises){
    const pr=PROMISES[ap.id]; if(!pr)continue;
    const metCount=pr.criteria.filter(c=>c.check()).length;
    const total=pr.criteria.length;
    outcomes[ap.id]=metCount===total?'kept':metCount>0?'partial':'broken';
  }
  // second pass: apply effects. partial credit only if ALL other promises were kept.
  for(const ap of GAME.activePromises){
    const pr=PROMISES[ap.id]; if(!pr)continue;
    const outcome=outcomes[ap.id];
    const otherAllKept=GAME.activePromises.filter(o=>o.id!==ap.id).every(o=>outcomes[o.id]==='kept');
    for(const sid of pr.bloc){
      if(!SIMULANTS[sid])continue;
      if(outcome==='kept'){ createGrudge("v_"+sid, 4, 0.9, "Kept their promise: "+pr.label); }
      else if(outcome==='partial'&&otherAllKept){ createGrudge("v_"+sid, 1.5, 0.9, "Made partial progress on: "+pr.label); }
      else if(outcome==='broken'){ createGrudge("v_"+sid, -5, 0.92, "Broke their promise: "+pr.label);
        SIMULANTS[sid].cynicism=(SIMULANTS[sid].cynicism||0)+2; }
    }
    if(outcome==='kept')GAME.log.push("✓ Promise kept: "+pr.label);
    else if(outcome==='partial'&&otherAllKept)GAME.log.push("~ Partial progress on: "+pr.label);
    else if(outcome==='partial')GAME.log.push("~ Partial (no bonus — other promises not fully kept): "+pr.label);
    else GAME.log.push("✗ Promise broken: "+pr.label);
    if(outcome==='broken')GAME.uturnCount=(GAME.uturnCount||0)+1;
  }
  GAME.activePromises=[];
}

/* ====================== QUARTERLY REPORT (start-of-quarter briefing) ======
   A Democracy-style summary shown at the top of each new quarter: how the
   headline metrics moved last quarter, the budget position, notable events
   from the log, and the economic forecast. Dismissed before the player acts. */
function metricDelta(k){
  const hist=GAME.history["m_"+k]; if(!hist||hist.length<2)return 0;
  return hist[hist.length-1].value-hist[hist.length-2].value;
}
function showQuarterReport(){

  const headline=[["gdp","GDP"],["unemployment","Unemployment"],["violentCrime","Crime"],
    ["homelessness","Homelessness"],["health","Health"],["education","Education"],
    ["taxBurden","Tax Burden"],["environment","Environment"]];
  const arrow=(k,d)=>{
    const m=METRICS[k]; const goodUp=!m.invert;

    const better=(d>0)===goodUp;
    const dir=d>0?"▲":"▼";

  };
  let rows="";
  for(const [k,label] of headline){

    ?`<div class="rrow"><span class="rlabel" style="color:var(--clay)">⚠ Structural Debt</span><span class="rdelta" style="color:var(--clay)">-$${GAME.structuralDebt.toFixed(1)}B</span></div>`
    :'';
  const budgetBlock=`<div class="rsection">
    <div class="rsec-h">💰 Budget</div>
    <div class="rrow"><span class="rlabel">Balance</span><span class="rdelta ${balClass}">${b.balance>=0?'+':''}$${b.balance.toFixed(1)}B</span></div>
    <div class="rrow"><span class="rlabel">Reserves (Rainy Day)</span><span class="rval">$${GAME.rainyDay.toFixed(1)}B</span></div>

    <div class="rrow"><span class="rlabel">Capital income</span><span class="rval">◈ ${GAME.capitalPerTurn}/qtr</span></div></div>`;
  const events=(GAME.log||[]).slice(-6).filter(l=>/began|RESOLVED|Midterms|kicker|Kicker|Reserves|Promise|Scandal|boom|Windfall|Federal|Deficit|debt|Austerity/i.test(l));
  const eventBlock=events.length?`<div class="rsection"><div class="rsec-h">📰 This Quarter</div>${events.map(e=>`<div class="revent">${e}</div>`).join("")}</div>`:"";
  const cyc=GAME.econCycle;
  const fc=cyc>0.25?"Good news — the economy is expanding, lifting revenue and GDP.":cyc<-0.25?"Storm clouds — the economy is contracting; expect revenue to soften.":"The economy is steady this quarter.";
  const forecastBlock=`<div class="rsection"><div class="rsec-h">🌐 Forecast</div><div class="rforecast">${fc}</div></div>`;
  card.innerHTML=`<div class="rhead"><h2>Quarterly Report</h2>
    <div class="sectionsub">Q${qtr} ${yr} · Term ${GAME.term}, quarter ${into+1} of ${GAME.termLengthTurns}. How the state moved last quarter.</div></div>
    <div class="rgrid">${rows}</div>
    <div class="rcols">${budgetBlock}${forecastBlock}</div>
    ${eventBlock}
    <label class="rskip"><input type="checkbox" id="rskipChk"> Skip these reports for the rest of the term</label>
    <button id="reportContinue" class="enactbtn">Continue ▸</button>`;
  document.getElementById("reportModal").classList.remove("hidden");
  document.getElementById("reportContinue").onclick=()=>{
    if(document.getElementById("rskipChk").checked)GAME.skipReport=true;

function showElection(r){
  GAME.gameOver=!r.won;
  const card=document.getElementById("electionCard");
  const thirdLine=r.thirdShare>0.02?`<div style="font-size:12px;color:#8a7a3a">${r.rcv?'Ranked-choice':'Spoiler effect'}: third parties drew ${(r.thirdShare*100).toFixed(1)}% of turnout${r.rcv?' — second preferences partly flowed back to you':' — splitting the vote against you'}</div>`:'';
  card.innerHTML=`<h2>Election — ${GAME.startYear+GAME.term*4}</h2>
    <div class="sectionsub">End of term ${GAME.term}. Turnout ${(r.turnout*100).toFixed(0)}%.</div>
    <div class="res ${r.won?'win':'lose'}">${r.won?'RE-ELECTED':'DEFEATED'} · ${(r.share*100).toFixed(1)}% vs ${(100-r.share*100).toFixed(1)}%</div>
    <div style="font-size:13px;color:#6b6557">Final approval: ${r.approval.toFixed(1)}%</div>
    ${thirdLine}
    <button id="electionContinue">${r.won?'Begin Next Term ▸':'New Game'}</button>`;
  document.getElementById("electionModal").classList.remove("hidden");
  document.getElementById("electionContinue").onclick=()=>{
    document.getElementById("electionModal").classList.add("hidden");
    GAME.lastMargin=clamp((r.share-0.5)*2,-1,1);
    if(r.won){
      GAME.term++;GAME.capital=clamp(GAME.capital+15,0,100);GAME.log.push("★ Term "+GAME.term+" begins");
      GAME.skipReport=false;              // quarterly reports resume each new term
      evaluatePromises();                 // judge last campaign's promises as the new term opens
      GAME.campaign={effort:{},promises:[],pool:10};
    }
    else location.reload();
    render();
  };
}
function endTurn(){
  if(GAME.gameOver)return;
  if(GAME.pendingDilemma){GAME.log.push("❖ Resolve the dilemma before ending the quarter");render();return;}
  settlePending();
  currentView="board"; detailKey=null;
  tickEconomy();
  tickPhase();
  tickEffSm();
  tickMembership();
  tickMetrics();
  GAME.lastBalance=budgetBalance().balance;
  settleFiscal();
  tickNationalMood();
  tickSituations();
  maybeFireDilemma();
  tickIndicators();
  tickGrudges();
  tickCynComp();
  tickGroundGame();
  tickApproval();
  tickVoterApproval();
  // political capital income scales with your Mandate. A strong mandate funds
  // real action; a weak one constrains you — but never to a standstill, so you
  // can always claw back. Roughly 4–13 per quarter (was a flat ~6).
  const mand=INDICATORS.mandate.value;
  GAME.mandateShock=(GAME.mandateShock||0)*0.82;          // event shocks fade over ~4-5 quarters
  if(Math.abs(GAME.mandateShock)<0.3)GAME.mandateShock=0;
  // Capital starvation: below mandate 25, each point of mandate lost cuts
  // income harder — political paralysis when the public has lost confidence.
  const starvationFactor = mand < 25 ? Math.max(0.20, mand/25) : 1;
  // Large angry unions strangle capital: they drag their feet on implementation and bleed political energy
  const uSize = SIMULANTS.publicUnions?.size ?? 0.07;
  const uApproval = SIMULANTS.publicUnions?.approval ?? 49;
  const unionBlock = (uSize > 0.05 && uApproval < 35)
    ? Math.max(0.45, 1 - Math.min(uSize - 0.05, 0.20) * 4 * Math.max(0, 35 - uApproval) / 35)
    : 1.0;
  GAME.capitalPerTurn=+((4+mand/100*9)*starvationFactor*unionBlock).toFixed(1);
  GAME.capital=clamp(GAME.capital+GAME.capitalPerTurn,0,100);
  GAME.turn++;
  pushHistory();
  const into=GAME.turn-(GAME.term-1)*GAME.termLengthTurns;
  if(into===GAME.midtermTurn){
    const swing=overallApproval()>52?"a green wave — your hand is strengthened":overallApproval()<45?"a rebuke — your standing weakens":"a mixed verdict";
    GAME.lastMargin=clamp((overallApproval()-50)/50,-1,1);   // midterms re-read your mandate
    GAME.log.push("🗳 Midterms: "+swing);
  }
  // the final quarter of the term is the campaign: surface the campaign screen
  // before the vote so the player can allocate effort and make promises
  if(into===GAME.termLengthTurns-1 && !GAME.campaignDone){
    openCampaign();
    if(GAME.log.length>8)GAME.log=GAME.log.slice(-8);
    return;
  }
  if(into>=GAME.termLengthTurns){GAME.campaignDone=false;render();showElection(runElection());return;}
  if(GAME.log.length>8)GAME.log=GAME.log.slice(-8);
  render();
  if(!GAME.skipReport)showQuarterReport();   // briefing on the quarter just elapsed
}

let currentView="board";
const main=document.getElementById("main");
function fmtMetric(m){
  if(m.fmt==="usd")return "$"+m.value.toFixed(2);
  if(m.fmt==="pctRaw")return m.value.toFixed(1)+"%";
  if(m.fmt==="pct")return Math.round(m.value)+"%";
  return Math.round(m.value);
}
function trendArrow(k){
  const prev=GAME.prevMetrics[k]; if(prev===undefined)return '<span class="trend flat">–</span>';
  const d=METRICS[k].value-prev,inv=METRICS[k].invert;
  if(Math.abs(d)<0.05)return '<span class="trend flat">–</span>';
  const good=inv?d<0:d>0;
  return `<span class="trend ${good?'up':'down'}">${d>0?'▲':'▼'}${Math.abs(d).toFixed(1)}</span>`;
}
/* ---------- sparkline: tiny inline SVG line chart from history ---------- */
function sparkline(series, opts={}){
  if(!series||series.length<2)return '<div class="sparkempty">No history yet — advance a few quarters.</div>';
  const w=opts.w||560, ht=opts.h||172, pad=24, botPad=opts.axis?32:24;
  const vals=series.map(s=>s.value);
  let lo=Math.min(...vals), hi=Math.max(...vals);
  if(opts.min!==undefined)lo=Math.min(lo,opts.min);
  if(opts.max!==undefined)hi=Math.max(hi,opts.max);
  if(hi-lo<1e-6){hi+=1;lo-=1;}
  const t0=series[0].turn!==undefined?series[0].turn:0;
  const tN=series[series.length-1].turn!==undefined?series[series.length-1].turn:series.length-1;
  const tspan=Math.max(1,tN-t0);
  const xByTurn=t=>pad+(t-t0)/tspan*(w-2*pad);
  const x=i=>series[i].turn!==undefined?xByTurn(series[i].turn):pad+i/(series.length-1)*(w-2*pad);
  const y=v=>ht-botPad-(v-lo)/(hi-lo)*(ht-pad-botPad);
  const pts=series.map((s,i)=>`${x(i).toFixed(1)},${y(s.value).toFixed(1)}`).join(" ");
  const col=opts.color||"var(--moss)";
  const area=`${x(0).toFixed(1)},${(ht-botPad).toFixed(1)} `+pts+` ${x(series.length-1).toFixed(1)},${(ht-botPad).toFixed(1)}`;
  const last=series[series.length-1].value, first=series[0].value;
  let marks="";
  // vertical policy-pass marker lines
  if(opts.marks&&opts.marks.length){
    for(const mk of opts.marks){
      if(mk.turn<t0||mk.turn>tN)continue;
      const mx=xByTurn(mk.turn).toFixed(1);
      marks+=`<line x1="${mx}" y1="${pad-4}" x2="${mx}" y2="${ht-botPad}" stroke="var(--ink)" stroke-width="1" stroke-dasharray="3 3" opacity="0.35"/>
        <text x="${mx}" y="${pad-7}" text-anchor="middle" class="sparkmark">${mk.label}</text>`;
    }
  }
  // x-axis quarter labels (start, middle, end)
  let axis="";
  if(opts.axis){
    const ticks=[t0, Math.round((t0+tN)/2), tN];
    for(const t of [...new Set(ticks)]){
      const tx=xByTurn(t).toFixed(1);
      axis+=`<text x="${tx}" y="${ht-8}" text-anchor="middle" class="sparkaxis">${turnLabel(t)}</text>`;
    }
  }
  return `<svg viewBox="0 0 ${w} ${ht}" class="spark" preserveAspectRatio="none">
    <polygon points="${area}" fill="${col}" opacity="0.12"/>
    ${marks}
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.5"/>
    <circle cx="${x(series.length-1)}" cy="${y(last)}" r="3.5" fill="${col}"/>
    <text x="${pad}" y="14" class="sparklbl">${opts.fmt?opts.fmt(first):first.toFixed(1)}</text>
    <text x="${w-pad}" y="14" text-anchor="end" class="sparklbl" fill="${col}">${opts.fmt?opts.fmt(last):last.toFixed(1)}</text>
    ${axis}
  </svg>`;
}
/* policy-pass markers for a metric chart: when did enacted policies that
   affect metric k get enacted? reads GAME.enactedAt + current effects. */
function policyMarksFor(k){
  const marks=[];
  for(const id in POLICIES){
    const p=POLICIES[id];
    if(p.effects&&p.effects[k]!==undefined&&GAME.enactedAt[id]!==undefined)
      marks.push({turn:GAME.enactedAt[id], label:p.icon||"•"});
  }
  return marks;
}

/* ============================================================
   EFFECTS BREAKDOWN — shows an item's full effect web as bars.
   Works for policies, agencies, and land use. Computes:
   (1) direct metric effects at current level
   (2) budget impact
   (3) downstream ripples via METRIC_LINKS
   (4) per-voter-bloc approval reaction
   ============================================================ */

/* direct metric effects {metricKey: delta} for any item kind */
function directEffects(kind,obj){
  const out={};
  if(kind==="policy"){
    for(const k in METRICS){const e=policyEffect(obj,k); if(Math.abs(e)>1e-6)out[k]=e;}
  } else if(kind==="agency"){
    const f=obj.funding??0.5;
    for(const k in (obj.effects||{}))out[k]=obj.effects[k]*f;
    const l=obj.logging??0.5;
    for(const k in (obj.loggingEffects||{}))out[k]=(out[k]||0)+obj.loggingEffects[k]*l;
  } else if(kind==="landuse"){
    for(const k in obj.effects)out[k]=obj.effects[k][obj.index];
  }
  return out;
}

/* downstream ripples: for each directly-affected metric, find METRIC_LINKS
   it feeds and estimate the per-turn nudge on the target metric.
   Returns [{from,to,delta}] approximations. */
function downstreamRipples(direct){
  const ripples=[];
  for(const L of METRIC_LINKS){
    if(direct[L.from]!==undefined){
      // a change in source metric of ~direct[from] eventually shifts it;
      // per-turn link nudge ≈ (sourceDelta) * coef * 0.25 (engine multiplier)
      const delta=direct[L.from]*L.coef*0.25;
      if(Math.abs(delta)>1e-4)ripples.push({from:L.from,to:L.to,delta});
    }
  }
  return ripples;
}

/* marginal approval reaction of one bloc to this item, reusing tickApproval math.
   Returns a signed score, or null if the group isn't genuinely affected.
   "Affected" requires real engagement: the item hits a metric the group
   cares about, matches an institution preference, OR produces an
   ideological reaction strong enough to clear the threshold — incidental
   near-zero alignment is filtered out so policies only touch the groups
   they actually concern. */
const REACT_THRESHOLD=2.2;
/* how strongly a bloc reacts to a policy on pure ideology (vs. only when the
   policy touches its concrete interest). Ideology blocs and the politically-
   defined region/income/housing families feel ideology fully; interest-defined
   sectors and life stages feel it only weakly and respond mainly through their
   sensitivities and explicit blocEffect. */
function ideoReactW(sim){
  const c=sim.category;
  if(c==="ideology")return 1.0;
  if(c==="region"||c==="income"||c==="housing")return 0.6;
  // interest-defined groups: weak ideological pull
  const weak={motorists:0.15,transitCommuters:0.2,timber:0.35,students:0.5,parents:0.25,retirees:0.45,
              blueCollar:0.4,businessClass:0.5,collegeEducated:0.5,publicUnions:0.6};
  return weak[sim.id]!==undefined?weak[sim.id]:0.4;
}
function blocReaction(kind,obj,sim){
  let m=0, engaged=false;
  const s=sim.sensitivities||{};
  if(kind==="policy"){
    const lvl=policyLevel(obj);
    // niche policies (narrow, identity-specific) don't generate a broad
    // ideological reaction from every loosely-aligned group — only the
    // groups named in blocEffect (or concretely engaged) react. This stops
    // e.g. transit commuters or moderates "having opinions" on sex work.
    // Interest-defined blocs (motorists, transit riders, timber, students,
    // parents) also feel ideology only weakly — they react to policy that
    // touches THEIR interest, via sensitivities and explicit blocEffect, not
    // to every fiscal or cultural fight. ideoReactW captures that.
    const ideoM=obj.niche?0:dot(policyIdeology(obj),sim.ideology)*lvl*5*ideoReactW(sim);
    m+=ideoM;
    // explicit per-bloc reaction: some policies hit specific groups directly,
    // scaled by how far the slider is set (a gas tax stings commuters/rural)
    if(obj.blocEffect&&obj.blocEffect[sim.id]!==undefined){
      m+=obj.blocEffect[sim.id]*(obj.mechanic==="slider"?lvl:1);
      engaged=true;
    }
    // per-tier bloc reaction: tier policies can hit specific groups differently
    // at each setting (e.g. minimum wage — rural workers react to the structure)
    if(obj.mechanic==="tier"&&obj.tierBlocEffects&&obj.tierBlocEffects[obj.tierIndex]&&obj.tierBlocEffects[obj.tierIndex][sim.id]!==undefined){
      m+=obj.tierBlocEffects[obj.tierIndex][sim.id];
      engaged=true;
    }
    // institution preference engagement
    if(obj.instTier&&sim.instPref&&sim.instPref[obj.instTier]!==undefined){
      const instM=sim.instPref[obj.instTier]*(lvl-0.5)*6;
      m+=instM;
      if(Math.abs(sim.instPref[obj.instTier])>=0.5)engaged=true;
    }
    // metric-interest engagement: does this policy move a metric this group prioritizes highly?
    for(const k in (obj.effects||{})){
      if(metricSensKey(k)&&Math.abs(s[metricSensKey(k)]||0)>=1.4)engaged=true;
    }
    // allocation channels' metrics too
    if(obj.mechanic==="allocation")for(const ch of obj.channels)for(const k in ch.effects)
      if(metricSensKey(k)&&Math.abs(s[metricSensKey(k)]||0)>=1.4)engaged=true;
  } else if(kind==="agency"){
    if(obj.ideology)m+=dot(obj.ideology,sim.ideology)*((obj.funding??0.5)-0.5)*6;
    if(obj.loggingIdeology)m+=dot(obj.loggingIdeology,sim.ideology)*((obj.logging??0.5)-0.5)*6;
    for(const k in (obj.effects||{}))
      if(metricSensKey(k)&&Math.abs(s[metricSensKey(k)]||0)>=1.4)engaged=true;
    for(const k in (obj.loggingEffects||{}))
      if(metricSensKey(k)&&Math.abs(s[metricSensKey(k)]||0)>=1.4)engaged=true;
  } else if(kind==="landuse"){
    m+=dot(obj.ideologyByStop[obj.index],sim.ideology)*5;
    // land use touches environment & homelessness interests
    if(Math.abs(s.environment||0)>=1.4||Math.abs(s.homelessness||0)>=1.4)engaged=true;
  }
  // affected if concretely engaged OR ideological reaction is strong on its own
  if(engaged||Math.abs(m)>=REACT_THRESHOLD)return m;
  return null;
}
/* map a metric key to the matching voter sensitivity key (some differ) */
function metricSensKey(metricKey){
  const map={unemployment:"unemployment",education:"education",violentCrime:"crime",propertyCrime:"crime",
    homelessness:"homelessness",health:"health",environment:"environment",gdp:"gdp",
    inequality:"inequality",loggingRate:"logging",incarcerationRate:"incarceration"};
  return map[metricKey]||null;
}

/* horizontal diverging bar: value can be + or -; scale sets full-width magnitude.
   opts.link = a detail key (e.g. "v_poor") makes the label a hyperlink. */
function effectBar(label,value,scale,opts={}){
  const pct=clamp(Math.abs(value)/scale*50,0,50);
  const pos=value>=0;
  const col = opts.color || (pos? 'var(--good)':'var(--clay)');
  const valLabel = opts.fmt?opts.fmt(value):(value>=0?'+':'')+value.toFixed(2);
  const labelHTML = opts.link
    ? `<a class="eblabel eblink" data-detail="${opts.link}">${label}</a>`
    : `<span class="eblabel">${label}</span>`;
  return `<div class="ebrow">${labelHTML}
    <div class="ebtrack"><div class="ebfill ${pos?'pos':'neg'}" style="width:${pct}%;${pos?'left':'right'}:50%;background:${col}"></div></div>
    <span class="ebval" style="color:${col}">${valLabel}</span></div>`;
}

function effectsBreakdownHTML(kind,obj){
  const direct=directEffects(kind,obj);
  let h=`<div class="ebsection"><div class="charttitle">Effects</div>`;

  // 1. Direct metric effects
  const dKeys=Object.keys(direct);
  if(dKeys.length){
    h+=`<div class="ebgroup-label">Direct effects on metrics</div><div class="ebgroup">`;
    // scale = largest magnitude among direct effects (min 1)
    const scale=Math.max(1,...dKeys.map(k=>Math.abs(direct[k])));
    for(const k of dKeys){
      const m=METRICS[k];
      // for inverted metrics, a positive raw push is "bad" → color accordingly
      const good = m && m.invert ? direct[k]<0 : direct[k]>0;
      h+=effectBar(m?m.name:k, direct[k], scale, {color: good?'var(--good)':'var(--clay)',
        link:m?("m_"+k):null,
        fmt:v=>(v>=0?'+':'')+v.toFixed(1)+(m&&m.fmt==='pctRaw'?' pts':'')});
    }
    h+=`</div>`;
  } else {
    h+=`<div class="ebnote">No direct metric effects.</div>`;
  }

  // 1b. Direct effects on indicators (policies only)
  if(kind==="policy"&&obj.indicatorEffects){
    const ik=Object.keys(obj.indicatorEffects).filter(k=>Math.abs(obj.indicatorEffects[k]*policyLevel(obj))>0.01);
    if(ik.length){
      h+=`<div class="ebgroup-label">Direct effects on indicators</div><div class="ebgroup">`;
      const scale=Math.max(1,...ik.map(k=>Math.abs(obj.indicatorEffects[k]*policyLevel(obj))));
      for(const k of ik){const ind=INDICATORS[k];const val=obj.indicatorEffects[k]*policyLevel(obj);
        h+=effectBar(ind?ind.name:k, val, scale, {color:val>=0?'var(--good)':'var(--clay)', link:"i_"+k, fmt:v=>(v>=0?'+':'')+v.toFixed(1)+' pts'});}
      h+=`</div>`;
    }
  }

  // 2. Budget impact
  let budget=0, budgetLabel="";
  if(kind==="policy"){budget=policyNetCost(obj);}
  else if(kind==="agency"){budget=agencySpend(obj);}
  else if(kind==="landuse"){budget=0;}
  if(kind!=="landuse"){
    const isRev=budget<0;
    h+=`<div class="ebgroup-label">Budget impact</div><div class="ebgroup">`;
    h+=effectBar(isRev?"Revenue generated":"Spending", Math.abs(budget), Math.max(1,Math.abs(budget)),
      {color:isRev?'var(--good)':'var(--clay)', fmt:v=>'$'+v.toFixed(2)+'B/yr'});
    h+=`</div>`;
  }

  // (second-order ripple effects are intentionally NOT shown — discovering
  //  the knock-on chains is part of the game)

  // 4. Voter bloc reactions — only genuinely-affected groups appear
  const reactions=[];
  for(const sid in SIMULANTS){
    const r=blocReaction(kind,obj,SIMULANTS[sid]);
    if(r!==null&&Math.abs(r)>0.05)reactions.push({sid,name:SIMULANTS[sid].name,r});
  }
  if(reactions.length){
    reactions.sort((a,b)=>b.r-a.r);
    h+=`<div class="ebgroup-label">Voter bloc reactions (${reactions.length} of ${Object.keys(SIMULANTS).length} groups affected)</div><div class="ebgroup">`;
    const scale=Math.max(1,...reactions.map(x=>Math.abs(x.r)));
    for(const x of reactions)
      h+=effectBar(x.name, x.r, scale, {color:x.r>=0?'var(--good)':'var(--clay)',
        link:"v_"+x.sid, fmt:v=>(v>=0?'+':'')+v.toFixed(1)});
    h+=`</div>`;
  } else {
    h+=`<div class="ebgroup-label">Voter bloc reactions</div><div class="ebnote">No voter group is significantly affected by this on its own.</div>`;
  }
  h+=`</div>`;
  return h;
}

/* ---------- BOARD (main page): metrics strip + 4 domain quadrants ---------- */
function renderBoard(){
  let h=`<div class="sectionhdr">Governing Board</div>
    <div class="sectionsub">Your policies, agencies, and the statistics they shape — as a living map. Hover any tile to light up what it connects to (<span style="color:var(--good)">green</span> helps, <span style="color:var(--clay)">red</span> hurts). Click to open.</div>`;
  // ---- active crises at the top ----
  const crises=Object.keys(GAME.activeSituations).sort((a,b)=>{
    const rank=s=>SITUATIONS[s].category==="chronic"?0:(SITUATIONS[s].kind==="bad"?1:2);
    return rank(a)-rank(b);
  });
  if(crises.length){
    h+=`<div class="crisis-strip">`;
    for(const sid of crises){
      const s=SITUATIONS[sid], age=(GAME.situationAge[sid]||0)+1;
      const tag=s.category==="chronic"?"CHRONIC":s.category==="event"?"EVENT":"FLARE-UP";
      h+=`<div class="crisis-card ${s.kind} ${s.category}" data-detail="s_${sid}">
        <div class="crisis-top"><span class="crisis-tag">${tag}</span><span class="crisis-age">${age}q</span></div>
        <div class="crisis-name">${s.kind==="good"?"✦":"⚠"} ${s.name}</div>
        <div class="crisis-desc">${s.desc}</div>
      </div>`;
    }
    h+=`</div>`;
  }

  // ===== node-and-connection graph (icon tiles in circles, like the Issue Web) =====
  // Layout: statistics cluster in the INNER ring; your policies & agencies sit in
  // the OUTER ring, ANGULARLY GROUPED BY DOMAIN so related levers cluster near the
  // stats they touch. Connections are drawn faintly and light up on hover.
  const edges=(typeof buildWebEdges==="function")?buildWebEdges():[];
  const W=1300,H=1040,cx=W/2,cy=H/2;
  const nodes={};
  // stats (metrics + indicators) — inner
  for(const s of allStats()){
    const key=s.key, nid=(s.ind?"i_":"m_")+key, m=s.stat;
    const good=s.ind?(m.value>=50):(m.invert?(m.value<m.baseline+3):(m.value>m.baseline-3));
    nodes[nid]={icon:m.icon||"📊", label:m.name, kind:s.ind?"indicator":"stat",
      stroke:s.ind?'var(--slate-blue)':(good?'var(--moss)':'var(--clay)'),
      val:s.ind?Math.round(m.value):fmtMetric(m), sec:sectionFor(key)};
  }
  // active crises/situations as nodes too (so the board shows the full system,
  // making the separate Issue Web redundant)
  for(const sid in GAME.activeSituations){
    const st=SITUATIONS[sid]; if(!st)continue;
    // route a situation to the section of the first metric it touches
    let sec="welfare";
    const firstMetric=st.metricEffect&&Object.keys(st.metricEffect)[0];
    if(firstMetric)sec=sectionFor(firstMetric)||"welfare";
    nodes["s_"+sid]={icon:st.kind==="good"?"✦":"⚠", label:st.name, kind:"situation",
      stroke:st.kind==="good"?'var(--good)':'var(--bad)', val:"", sec};
  }
  // policies + agencies + landuse — outer
  for(const id in POLICIES)if(POLICIES[id].enacted){
    const p=POLICIES[id];
    const sub=p.mechanic==="tier"?p.tiers[p.tierIndex]:(p.mechanic==="law"?"In force":(p.mechanic==="toggle"?(p.enabled?"On":"Off"):(p.mechanic==="intensity"?(p.enabled?policyRealLabel(p):"Off"):policyRealLabel(p))));
    nodes["p_"+id]={icon:p.icon||"📋", label:p.name, kind:"policy", stroke:'var(--slate-blue)', val:sub, sec:sectionFor(id)};
  }
  for(const id in AGENCIES){const a=AGENCIES[id];
    nodes["a_"+id]={icon:a.icon||"🏛️", label:a.name, kind:"agency", stroke:'#b9a77a', val:"$"+agencySpend(a).toFixed(2)+"B", sec:sectionFor(id)};}
  nodes["landuse"]={icon:LANDUSE.icon, label:LANDUSE.name, kind:"policy", stroke:'var(--slate-blue)', val:LANDUSE.presets[LANDUSE.index], sec:sectionFor("landuse")||"environment"};

  // order sections consistently
  const secOrder=Object.keys(SECTIONS);
  // group nodes by section
  const bySec={}; for(const sid of secOrder)bySec[sid]={stats:[],levers:[]};
  const otherSec={stats:[],levers:[]};
  for(const id in nodes){
    const n=nodes[id], bucket=bySec[n.sec]||otherSec;
    // levers = your policies & agencies (outer fan); everything else (metrics,
    // indicators, active crises) is an outcome/readout on the inner band
    const isLever = n.kind==="policy"||n.kind==="agency";
    (isLever?bucket.levers:bucket.stats).push(id);
  }
  // DOMAIN-CLUSTER layout: each section is a constellation placed around the
  // canvas. Within a cluster, levers (policies/agencies) form an outer fan and
  // the stats they touch sit just inside — so each domain reads as its own
  // little system, and cross-domain connections arc between clusters.
  const secList=secOrder.filter(s=>(bySec[s].stats.length+bySec[s].levers.length)>0);
  const nSec=secList.length;
  const clusterR=Math.min(W,H)*0.30;           // distance of each cluster center from middle
  secList.forEach((sid,si)=>{
    const ca=-Math.PI/2 + si*2*Math.PI/nSec;    // this cluster's angle around the center
    const ccx=cx+clusterR*Math.cos(ca), ccy=cy+clusterR*Math.sin(ca);
    nodes["__sec_"+sid]={hub:true, x:ccx, y:ccy, label:SECTIONS[sid].name, icon:SECTIONS[sid].icon};
    const levers=bySec[sid].levers, stats=bySec[sid].stats;
    // place a set of nodes as a small block of staggered rows facing outward
    // (levers) or inward (stats) from the cluster center, so even 10 nodes fit
    // without overlapping
    const placeBlock=(ids,baseRad,facing)=>{
      const tang=ca+Math.PI/2, perRow=Math.ceil(Math.sqrt(ids.length)*1.1)||1;
      ids.forEach((id,i)=>{
        const row=Math.floor(i/perRow), col=i%perRow;
        const rowCount=Math.min(perRow, ids.length-row*perRow);
        const t=rowCount===1?0:(col/(rowCount-1)-0.5);     // -0.5..0.5 across the row
        const along=t*(82*rowCount);                        // tangential spacing
        const out=facing*(baseRad+row*80);                  // outward by row
        nodes[id].x=ccx+Math.cos(ca)*out+Math.cos(tang)*along;
        nodes[id].y=ccy+Math.sin(ca)*out+Math.sin(tang)*along;
      });
    };
    // both stats and levers fan OUTWARD from the cluster center (stats on the
    // inner rows nearest the cluster hub, levers beyond them), keeping the
    // canvas center empty so neighbouring clusters never collide there.
    placeBlock(stats, 70, 1);                  // inner band of the cluster
    const leverBase=70+ (Math.ceil(stats.length/(Math.ceil(Math.sqrt(stats.length)*1.1)||1)))*80 + 20;
    placeBlock(levers, leverBase, 1);          // beyond the stats
  });
  for(const id in otherSec){ /* any unsectioned nodes: drop near center */ }
  [...otherSec.stats,...otherSec.levers].forEach((id,i,arr)=>{const a2=i*2*Math.PI/Math.max(1,arr.length);nodes[id].x=cx+60*Math.cos(a2);nodes[id].y=cy+60*Math.sin(a2);});

  const drawn=buildWebEdges().filter(e=>nodes[e.a]&&nodes[e.b]);
  // fit the viewBox to the actual node extent (the clusters fan outward, so the
  // content is wider/taller than the nominal canvas) with padding for labels
  let bx0=1e9,by0=1e9,bx1=-1e9,by1=-1e9;
  for(const id in nodes){const n=nodes[id]; if(n.x===undefined)continue; bx0=Math.min(bx0,n.x);by0=Math.min(by0,n.y);bx1=Math.max(bx1,n.x);by1=Math.max(by1,n.y);}
  const pad=70; const vbx=bx0-pad, vby=by0-pad, vbw=(bx1-bx0)+pad*2, vbh=(by1-by0)+pad*2;
  let svg=`<svg id="boardSvg" viewBox="${vbx.toFixed(0)} ${vby.toFixed(0)} ${vbw.toFixed(0)} ${vbh.toFixed(0)}" xmlns="http://www.w3.org/2000/svg">`;
  // faint radial dividers between adjacent domain clusters (drawn first, behind
  // everything) so each domain reads as its own separated wedge of the map
  {
    const outR=Math.max(vbw,vbh);
    for(let si=0; si<nSec; si++){
      const divA=-Math.PI/2 + (si-0.5)*2*Math.PI/nSec;   // halfway between this cluster and the previous
      const x2=cx+outR*Math.cos(divA), y2=cy+outR*Math.sin(divA);
      const xi=cx+90*Math.cos(divA), yi=cy+90*Math.sin(divA);
      svg+=`<line class="bn-divider" x1="${xi.toFixed(0)}" y1="${yi.toFixed(0)}" x2="${x2.toFixed(0)}" y2="${y2.toFixed(0)}"/>`;
    }
  }
  // faint cluster hub labels behind everything
  for(const id in nodes){ if(!nodes[id].hub)continue; const n=nodes[id];
    svg+=`<text x="${n.x.toFixed(0)}" y="${n.y.toFixed(0)}" text-anchor="middle" class="bn-hub">${n.icon} ${n.label}</text>`;
  }
  for(let i=0;i<drawn.length;i++){
    const e=drawn[i], A=nodes[e.a], B=nodes[e.b];
    const mx=(A.x+B.x)/2+(cx-(A.x+B.x)/2)*0.16, my=(A.y+B.y)/2+(cy-(A.y+B.y)/2)*0.16;
    const col=e.neutral?'var(--slate-blue)':(e.good?'var(--good)':'var(--clay)');
    const w=clamp(0.8+e.w*0.12,0.8,3);
    svg+=`<path class="webedge${e.neutral?' eneutral':''}" data-a="${e.a}" data-b="${e.b}" d="M${A.x.toFixed(0)},${A.y.toFixed(0)} Q${mx.toFixed(0)},${my.toFixed(0)} ${B.x.toFixed(0)},${B.y.toFixed(0)}" stroke="${col}" stroke-width="${w}" fill="none"/>`;
  }
  // nodes — icon-forward "logo" tiles in circles
  for(const id in nodes){
    const n=nodes[id]; if(n.x===undefined||n.hub)continue;   // hubs are drawn as labels only, not clickable
    const isStat=n.kind==="stat", isInd=n.kind==="indicator", isSit=n.kind==="situation";
    const r=(isStat||isInd)?26:30;
    const below=n.y>=cy;
    const ly=below?(r+13):(-r-7);
    // indicators get a dashed ring + tinted fill (derived gauges); situations a
    // bold alert ring; policies/agencies the solid "logo" tile
    const dash=isInd?` stroke-dasharray="4 3"`:"";
    const fill=isInd?"var(--paper-2)":(isSit?(n.stroke==='var(--good)'?"#eef5e9":"#f6e9e4"):"var(--paper)");
    const ringW=isSit?3.2:2.4;
    svg+=`<g class="boardnode ${n.kind}" data-node="${id}" data-detail="${id}" transform="translate(${n.x.toFixed(0)},${n.y.toFixed(0)})">
      <circle class="bn-ring" r="${r}" fill="${fill}" stroke="${n.stroke}" stroke-width="${ringW}"${dash}/>
      <text class="bn-ico" y="${(isStat||isInd)?7:8}" text-anchor="middle" font-size="${(isStat||isInd)?22:25}">${n.icon}</text>
      <text class="bn-lbl" y="${ly}" text-anchor="middle">${n.label.length>22?n.label.slice(0,21)+"…":n.label}</text>
    </g>`;
  }
  svg+=`</svg>`;
  // ---- key-metrics header: the biggest priorities at a glance ----
  const keyMetrics=[["gdp","GDP Growth"],["unemployment","Unemployment"],["violentCrime","Violent Crime"],
    ["propertyCrime","Property Crime"],["homelessness","Homelessness"],["health","Health"],
    ["education","Education"],["environment","Environment"]];
  let kh=`<div class="keystat-row">`;
  for(const [k,label] of keyMetrics){
    const m=METRICS[k]; if(!m)continue;
    const val=fmtMetric(m);
    const good=m.invert?(m.value<m.baseline+3):(m.value>m.baseline-3);
    const trend=trendArrow(k);
    kh+=`<div class="keystat ${good?'kgood':'kbad'}" data-detail="m_${k}">
      <div class="ks-ico">${m.icon||"📊"}</div>
      <div class="ks-body"><div class="ks-label">${label}</div>
      <div class="ks-val">${val}${trend}</div></div></div>`;
  }
  kh+=`</div>`;
  h+=kh;
  // legend for the graph node types — sits between the key metrics and the map
  h+=`<div class="boardlegend">
      <span class="blg"><svg width="20" height="20"><circle cx="10" cy="10" r="8" fill="var(--paper)" stroke="var(--slate-blue)" stroke-width="2.2"/></svg>Policy / agency — your levers</span>
      <span class="blg"><svg width="20" height="20"><circle cx="10" cy="10" r="8" fill="var(--paper)" stroke="var(--moss)" stroke-width="2.2"/></svg>Statistic — a real outcome</span>
      <span class="blg"><svg width="20" height="20"><circle cx="10" cy="10" r="8" fill="var(--paper-2)" stroke="var(--slate-blue)" stroke-width="2.2" stroke-dasharray="4 3"/></svg>Indicator — a derived gauge</span>
      <span class="blg"><svg width="20" height="20"><circle cx="10" cy="10" r="8" fill="#f6e9e4" stroke="var(--bad)" stroke-width="3"/></svg>Active crisis</span>
    </div>`;
  h+=`<div class="websearch" style="margin-top:10px"><input type="search" id="boardSearch" placeholder="Search policies, metrics, agencies…" autocomplete="off"></div>`;
  h+=`<div class="boardgraph">${svg}</div>`;
  main.innerHTML=h;

  // interactions: hover lights up connections (green helps / red hurts), click opens
  const svgEl=document.getElementById("boardSvg");
  main.querySelectorAll('.crisis-card').forEach(el=>el.addEventListener('click',()=>openDetail(el.dataset.detail)));
  main.querySelectorAll('.keystat').forEach(el=>el.addEventListener('click',()=>openDetail(el.dataset.detail)));
  if(!svgEl||!svgEl.querySelectorAll)return;
  const edgeEls=Array.from(svgEl.querySelectorAll(".webedge")), nodeEls=Array.from(svgEl.querySelectorAll(".boardnode"));
  nodeEls.forEach(g=>{
    const id=g.dataset.node;
    g.addEventListener("mouseenter",()=>{
      const sign={};  // neighbor id -> 'good'|'bad'|'neutral'
      edgeEls.forEach(p=>{
        const on=p.dataset.a===id||p.dataset.b===id;
        p.classList.toggle("hot",on);
        if(on){const other=p.dataset.a===id?p.dataset.b:p.dataset.a;
          sign[other]=p.classList.contains("eneutral")?"neutral":(p.getAttribute("stroke").includes("good")?"good":"bad");}
      });
      nodeEls.forEach(n2=>{
        const nid=n2.dataset.node;
        if(nid===id){n2.classList.add("focus");return;}
        if(sign[nid]){n2.classList.add(sign[nid]==="good"?"nbgood":sign[nid]==="neutral"?"nbneutral":"nbbad");}
        else n2.classList.add("dim");
      });
      svgEl.classList.add("focus");
    });
    g.addEventListener("mouseleave",()=>{
      edgeEls.forEach(p=>p.classList.remove("hot"));
      nodeEls.forEach(n2=>n2.classList.remove("dim","focus","nbgood","nbbad","nbneutral"));
      svgEl.classList.remove("focus");
    });
    g.addEventListener("click",()=>openDetail(id));
  });
  // board search bar
  const boardSearchEl=document.getElementById("boardSearch");
  if(boardSearchEl){
    boardSearchEl.addEventListener("input",()=>{
      const q=boardSearchEl.value.trim().toLowerCase();
      if(!q){
        nodeEls.forEach(n=>n.classList.remove("searchhit","dim"));
        edgeEls.forEach(p=>p.classList.remove("hot"));
        svgEl.classList.remove("focus");
        return;
      }
      svgEl.classList.add("focus");
      const hitIds=new Set();
      nodeEls.forEach(g=>{
        const id=g.dataset.node, n=nodes[id];
        const match=n&&(n.label.toLowerCase().includes(q)||id.toLowerCase().includes(q));
        g.classList.toggle("searchhit",!!match);
        g.classList.toggle("dim",!match);
        if(match)hitIds.add(id);
      });
      edgeEls.forEach(p=>{
        p.classList.toggle("hot",hitIds.has(p.dataset.a)||hitIds.has(p.dataset.b));
      });
    });
  }
}
/* trend arrow for indicators (mirrors trendArrow for metrics) */
function indTrend(key){
  const prev=GAME.prevIndicators?GAME.prevIndicators[key]:undefined;
  if(prev===undefined)return '';
  const d=INDICATORS[key].value-prev;
  if(Math.abs(d)<0.4)return '';
  return ` <span class="trend ${d>0?'up':'down'}">${d>0?'▲':'▼'}</span>`;
}

/* ---------- DETAIL PAGE ---------- */
let detailKey=null;
function openDetail(key){
  settlePending();
  detailKey=key; currentView="detail";
  const snap=snapshotFor(key);
  if(snap!==null)GAME.pending={key,snap};
  // track harvest-level slider independently (separate capital charge)
  GAME.pendingLog=null;
  if(key.startsWith("a_")){const a=AGENCIES[key.slice(2)];if(a&&a.logging!==undefined)GAME.pendingLog={id:key.slice(2),snap:a.logging};}
  render();
}
function renderDetail(){
  const key=detailKey;
  // is there an unsaved, changed proposal on this page?
  const fundPendActive = GAME.pending && GAME.pending.key===key && snapshotFor(key)!==GAME.pending.snap;
  const logPendActive = GAME.pendingLog && key.startsWith("a_") && GAME.pendingLog.id===key.slice(2) && AGENCIES[key.slice(2)]?.logging!==GAME.pendingLog.snap;
  const pendActive = fundPendActive || logPendActive;
  const pendCost = (fundPendActive ? chargeFor(key) : 0) + (logPendActive ? (AGENCIES[key.slice(2)]?.capital||4) : 0);
  let h=`<div class="detailtop"><button class="backbtn" id="backBtn">‹ Back to board</button>`;
  h+=`</div>`;
  if(pendActive)h+=`<div class="pendbanner">Unsaved change — returning to the board spends <b>◈ ${pendCost}</b> to make it official. Use <b>Undo</b> below to discard it for free.${GAME.capital<pendCost?` <span style="color:var(--bad)">You only have ◈ ${Math.floor(GAME.capital)} — it will revert.</span>`:''}</div>`;
  if(key.startsWith("m_")){
    const k=key.slice(2), m=METRICS[k];
    h+=`<div class="sectionhdr">${m.name}</div><div class="sectionsub">${m.realNote||''}</div>`;
    h+=`<div class="detailrow"><span class="pill dom">State statistic</span><span class="pill">Measured condition — moved by policy, agencies, crises, and other statistics</span></div>`;
    h+=`<div class="detailval">${fmtMetric(m)} ${trendArrow(k)}</div>`;
    h+=`<div class="chartbox"><div class="charttitle">Value over time</div>
      ${sparkline(GAME.history["m_"+k],{axis:true, marks:policyMarksFor(k), color:m.invert?'var(--clay)':'var(--moss)',fmt:v=>m.fmt==="pctRaw"?v.toFixed(1)+"%":Math.round(v)})}
      <div class="chartnote">Dashed lines mark when policies affecting this statistic were enacted.</div></div>`;
    // ---- contributors: everything shaping this metric's target ----
    const cons=metricContributors(k);
    if(cons.length){
      const better=v=>m.invert?v<0:v>0;
      const real=cons.filter(c=>!c.base);
      real.sort((a,b)=>{const ab=better(a.v)?0:1,bb=better(b.v)?0:1;return ab-bb||Math.abs(b.v)-Math.abs(a.v);});
      h+=`<div class="ebgroup-label">What's driving this number</div><div class="ebgroup">`;
      h+=`<div class="threshline" style="opacity:.8">⊕ Natural equilibrium: ${m.eq}${m.fmt==='usd'?' ($)':''} — where this statistic drifts with no intervention</div>`;

          contribs.sort((a,b)=>{const ai=improving(a.e)?0:1,bi=improving(b.e)?0:1; return ai-bi || Math.abs(b.e)-Math.abs(a.e);});
          h+=`<div class="ebgroup-label">What's improving or worsening this crisis</div><div class="ebgroup">`;
          const scale=Math.max(0.5,...contribs.map(c=>Math.abs(c.e)));
          for(const c of contribs){
            const good=improving(c.e);
            h+=effectBar(c.name + (good?" — easing":" — worsening"), c.e, scale,
              {color:good?'var(--good)':'var(--clay)',link:c.link,fmt:v=>(v>=0?'+':'')+v.toFixed(2)});
          }
          h+=`<div class="threshline" style="margin-top:6px;font-style:italic">Bars show each lever's push on ${nm} per quarter at current settings. Causes (other statistics) are listed alongside the policies and agencies acting directly on it.</div></div>`;
        } else {
          h+=`<div class="ebgroup-label">What's improving or worsening this crisis</div><div class="ebnote">No active policy is currently moving ${nm}. The crisis will persist until you act.</div>`;
        }
      }
    }
    // metric effects per quarter
    const me=Object.keys(s.metricEffect||{});
    if(me.length){
      h+=`<div class="ebgroup-label">Ongoing effect on metrics (per quarter)</div><div class="ebgroup">`;
      const magOf=v=>typeof v==="object"?((v.b||0)+(v.c||0)):v;
      const scale=Math.max(0.5,...me.map(k=>Math.abs(magOf(s.metricEffect[k]))));
      for(const k of me){const m=METRICS[k];const val=magOf(s.metricEffect[k]);const good=m&&m.invert?val<0:val>0;
        h+=effectBar(m?((m.icon||'')+' '+m.name):k,val,scale,{color:good?'var(--good)':'var(--clay)',link:m?("m_"+k):null,fmt:v=>(v>=0?'+':'')+v.toFixed(1)+'/q'});}
      h+=`</div>`;
    }
    // overall + per-group opinion impact
    h+=`<div class="ebgroup-label">Effect on voter blocs</div><div class="ebgroup">`;
    const rows=[];
    for(const vid in SIMULANTS){
      const sim=SIMULANTS[vid];
      let m=(s.kind==="good"?s.moodMag:-s.moodMag);
      if(s.moodAxes)m+=dot(s.moodAxes,sim.ideology)*3;
      if(s.groupMood&&s.groupMood[vid]!==undefined)m+=s.groupMood[vid];
      rows.push({vid,name:sim.name,m});
    }
    rows.sort((a,b)=>b.m-a.m);
    const scale=Math.max(1,...rows.map(r=>Math.abs(r.m)));
    for(const r of rows)
      h+=effectBar(r.name,r.m,scale,{color:r.m>=0?'var(--good)':'var(--clay)',link:"v_"+r.vid,fmt:v=>(v>=0?'+':'')+v.toFixed(1)});
    h+=`</div>`;
    if(s.minTurns)h+=`<div class="sectionsub" style="margin-top:12px">This ${s.category==="event"?"event":"situation"} persists at least ${s.minTurns} quarters before it can subside.</div>`;
  } else if(key==="nationalMood"){
    const nm=NATIONAL_MOOD.value;
    h+=`<div class="sectionhdr">National Political Mood</div>
      <div class="sectionsub">The national political environment — your party's standing nationally. It drifts on its own (a random walk you can't directly control) and lifts or drags every bloc's approval depending on how aligned they are with your administration.</div>`;
    h+=`<div class="detailval" style="color:${nm>1?'var(--good)':nm<-1?'var(--clay)':'#8a8270'}">${nm>=0?'+':''}${nm.toFixed(1)}</div>`;
    h+=`<div class="chartbox"><div class="charttitle">National mood over time</div>
      ${sparkline(GAME.history["nationalMood"],{color:'var(--slate-blue)',min:-10,max:10,fmt:v=>(v>=0?'+':'')+v.toFixed(1)})}</div>`;
    h+=`<div class="sectionsub">When favorable, aligned blocs (progressive-leaning) reward you and opposed blocs sour; when hostile, the reverse. You can't set it, only weather it.</div>`;
  } else if(key.startsWith("i_")){
    const id=key.slice(2), ind=INDICATORS[id];
    const col=ind.value>=60?'var(--good)':ind.value>=42?'var(--warn)':'var(--bad)';
    h+=`<div class="sectionhdr">${ind.icon} ${ind.name}</div><div class="sectionsub">${ind.desc}</div>`;
    h+=`<div class="detailrow"><span class="pill dom">Derived statistic</span><span class="pill">A gauge computed from other statistics &amp; crises — not directly settable</span></div>`;
    h+=`<div class="detailval" style="color:${col}">${Math.round(ind.value)}<span style="font-size:16px;color:#8a8270">/100</span></div>`;
    h+=`<div class="chartbox"><div class="charttitle">${ind.name} over time</div>
      ${sparkline(GAME.history["i_"+id],{axis:true,color:'var(--slate-blue)',min:0,max:100,fmt:v=>Math.round(v)})}</div>`;
    // what FEEDS this number (the derive breakdown)
    if(ind.drivers){
      const rawDs=ind.drivers();
      const existingLinks=new Set(rawDs.map(d=>d.link).filter(Boolean));
      const autoDs=indBoostDrivers(id).filter(d=>!existingLinks.has(d.link));
      const ds=[...rawDs,...autoDs].filter(d=>d.base||Math.abs(d.v)>0.05);
      if(ds.length){
        h+=`<div class="ebgroup-label">What feeds this number</div><div class="ebgroup">`;
        const scale=Math.max(1,...ds.filter(d=>!d.base).map(d=>Math.abs(d.v)));
        for(const d of ds){
          if(d.base){h+=`<div class="threshline" style="opacity:.8">${d.name}: ${d.v}</div>`;continue;}
          h+=effectBar(d.name, d.v, scale, {color:d.v>=0?'var(--good)':'var(--clay)', link:d.link||null, fmt:v=>(v>=0?'+':'')+v.toFixed(1)});
        }
        h+=`<div class="threshline" style="margin-top:6px;font-style:italic">These combine (plus active crises) into the gauge, which then eases toward that target with some lag.</div></div>`;
      }
    }
    // what it feeds into
    const fb=Object.keys(ind.feedback||{});
    if(fb.length){
      h+=`<div class="ebgroup-label">What this indicator drives</div><div class="ebgroup">`;
      const scale=Math.max(0.02,...fb.map(k=>Math.abs(ind.feedback[k])));
      for(const k of fb){const m=METRICS[k];const good=m&&m.invert?ind.feedback[k]<0:ind.feedback[k]>0;
        h+=effectBar(m?m.name:k, ind.feedback[k]*100, scale*100, {color:good?'var(--good)':'var(--clay)', link:m?"m_"+k:null, fmt:v=>(v>=0?'+':'')+(v/100).toFixed(3)+'/pt'});}
      h+=`<div class="threshline" style="margin-top:6px;font-style:italic">Each point this indicator sits above 50 nudges these metrics per quarter (and vice-versa below 50).</div></div>`;
    }
    h+=`<div class="sectionsub" style="margin-top:12px">This indicator is computed from the state of your metrics and active situations — improve the underlying conditions and it follows, with some lag.</div>`;
  }
  main.innerHTML=h;
  // back/undo: wire BOTH directly (reliable) and rely on delegation as backup.
  // Guard render() so a hiccup can never strand the player on the detail page.
  // "Back to board" always commits any pending change and returns — the banner
  // already warns of the capital cost, and Undo is the explicit free escape.
  // (We deliberately don't gate this on confirm(): some preview/embedded
  // environments suppress dialogs, which previously made the button look dead.)
  const goBack=()=>{
    try{ settlePending(); }catch(err){/* never block navigation */}
    currentView="board"; detailKey=null;
    try{render();}catch(err){ try{renderBoard();renderHUD();renderSidebar();}catch(e2){} }
  };
  const doUndo=()=>{
    const key=detailKey;
    if(key&&GAME.pending&&GAME.pending.key===key){restoreFrom(key,GAME.pending.snap);GAME.pending=null;}
    if(GAME.pendingLog){const a=AGENCIES[GAME.pendingLog.id];if(a)a.logging=GAME.pendingLog.snap;GAME.pendingLog=null;}
    try{render();}catch(err){}
  };
  const bb=document.getElementById("backBtn"); if(bb)bb.onclick=goBack;
  const ub=document.getElementById("undoBtn"); if(ub)ub.onclick=doUndo;
  main.querySelectorAll('[data-detail]').forEach(el=>el.addEventListener('click',()=>openDetail(el.dataset.detail)));
  main.querySelectorAll('[data-repeal]').forEach(el=>el.addEventListener('click',()=>repealPolicy(el.dataset.repeal)));
  wirePolicyControls();
}

function enactPolicy(id){
  const src=CATALOG[id];
  if(GAME.capital<src.enactCapital){GAME.log.push("✗ Not enough capital to enact "+src.name);render();return;}
  GAME.capital-=src.enactCapital;
  const p=Object.assign({},src); delete p.enactCapital; p.enacted=true;
  p.eff=0;                       // effects phase in from zero
  GAME.enactedAt[id]=GAME.turn;
  POLICIES[id]=p;
  delete CATALOG[id];
  GAME.log.push("★ Enacted "+p.name);
  openDetail("p_"+id);
}
/* Repeal an enacted policy: costs political capital, moves it back to the
   catalog, removes its effects/cost. Some policies are tagged
   noRepeal:true (e.g. the prison regimen — you can only set its harshness,
   not abolish incarceration). Repeal angers blocs that backed it. */
function repealPolicy(id){
  const p=POLICIES[id];
  if(!p||p.noRepeal)return;
  const cost=p.repealCost!==undefined?p.repealCost:(p.capital||6);
  if(GAME.capital<cost){GAME.log.push("✗ Not enough capital to repeal "+p.name);render();return;}
  GAME.capital-=cost;
  // backlash: backers grudge you, and a U-turn (enact-then-repeal within
  // 2 years) breeds lasting cynicism — D4's flip-flop penalty
  const uturn=GAME.enactedAt[id]!==undefined&&(GAME.turn-GAME.enactedAt[id])<8;
  if(uturn)GAME.uturnCount=(GAME.uturnCount||0)+1;
  for(const sid in SIMULANTS){
    const r=blocReaction("policy",p,SIMULANTS[sid]);
    if(r!==null&&r>0.5){
      createGrudge("v_"+sid,-Math.min(r,5),0.88,"Repealed "+p.name);
      SIMULANTS[sid].cynicism=(SIMULANTS[sid].cynicism||0)+Math.min(4,r)*(uturn?2:1);
    }
  }
  if(uturn)GAME.log.push("⟲ U-turn on "+p.name+" — voters notice flip-flops");
  const back=Object.assign({},p); delete back.enacted; delete back.eff;
  back.enactCapital=p.enactCapital!==undefined?p.enactCapital:(p.capital||8);
  CATALOG[id]=back;
  delete POLICIES[id];
  // effects don't vanish overnight — the repealed law fades out over its phase-in period
  const ghost=Object.assign({},p); ghost.eff=effLevelOf(p);
  GAME.fading[id]=ghost?{pol:ghost}:null;
  GAME.log.push("✘ Repealed "+p.name+" — effects fading over "+policyPhaseQuarters(p)+" quarters");
  currentView="board"; render();
}
/* ============================================================
   CAPITAL ON EXIT — adjusting a policy/agency/land-use no longer
   charges capital per click. Instead, a snapshot is taken when you
   open its page; when you LEAVE (navigate anywhere else or end the
   turn), if the setting differs from the snapshot, the capital cost
   is charged ONCE. If you can't afford it, the change reverts.
   ============================================================ */
function snapshotFor(key){
  if(key.startsWith("p_")){const p=POLICIES[key.slice(2)];return p?JSON.stringify({v:p.value,t:p.tierIndex,e:p.enabled,i:p.intensity,ch:p.channels?p.channels.map(c=>c.share):null}):null;}
  if(key.startsWith("a_")){const a=AGENCIES[key.slice(2)];return a?JSON.stringify({f:a.funding}):null;}
  if(key==="landuse")return JSON.stringify({i:LANDUSE.index});
  return null;
}
function restoreFrom(key,snap){
  const d=JSON.parse(snap);
  if(key.startsWith("p_")){const p=POLICIES[key.slice(2)];if(!p)return;p.value=d.v;p.tierIndex=d.t;p.enabled=d.e;p.intensity=d.i;if(d.ch&&p.channels)p.channels.forEach((c,i)=>c.share=d.ch[i]);}
  else if(key.startsWith("a_")){const a=AGENCIES[key.slice(2)];if(a)a.funding=d.f;}
  else if(key==="landuse")LANDUSE.index=d.i;
}
function chargeFor(key){
  // Large public unions add friction to every policy change: extra bargaining, legal review, institutional drag
  const uSize = SIMULANTS.publicUnions?.size ?? 0.07;
  const uFriction = 1 + Math.min(Math.max(0, uSize - 0.05) * 2, 0.25); // up to +25% at peak union density
  if(key.startsWith("p_")){const p=POLICIES[key.slice(2)];return p?Math.round((p.capital||5)*uFriction):0;}
  if(key.startsWith("a_")){const a=AGENCIES[key.slice(2)];return a?Math.round((a.capital||4)*uFriction):0;}
  if(key==="landuse")return Math.round((LANDUSE.capital||8)*uFriction);
  return 0;
}
function nameFor(key){
  if(key.startsWith("p_")){const p=POLICIES[key.slice(2)];return p?p.name:key;}
  if(key.startsWith("a_")){const a=AGENCIES[key.slice(2)];return a?a.name:key;}
  if(key==="landuse")return LANDUSE.name;
  return key;
}
/* settle any pending change before leaving the current page */
function settlePending(){
  const pend=GAME.pending;
  GAME.pending=null;
  if(pend){
    const now=snapshotFor(pend.key);
    if(now!==null&&now!==pend.snap){
      const cost=chargeFor(pend.key);
      if(GAME.capital>=cost){GAME.capital-=cost;GAME.log.push("◈ "+cost+" capital — changed "+nameFor(pend.key));}
      else{restoreFrom(pend.key,pend.snap);GAME.log.push("✗ Not enough capital — "+nameFor(pend.key)+" reverted");}
    }
  }
  // settle harvest-level slider independently
  const pendL=GAME.pendingLog;
  GAME.pendingLog=null;
  if(pendL){
    const a=AGENCIES[pendL.id];
    if(a&&a.logging!==pendL.snap){
      const cost=a.capital||4;
      if(GAME.capital>=cost){GAME.capital-=cost;GAME.log.push("◈ "+cost+" capital — adjusted "+a.name+" harvest level");}
      else{a.logging=pendL.snap;GAME.log.push("✗ Not enough capital — "+a.name+" harvest level reverted");}
    }
  }
}
function wirePolicyControls(){
  main.querySelectorAll('[data-kind="slider"]').forEach(el=>el.addEventListener('change',e=>{const p=POLICIES[e.target.dataset.pol];if(p)p.value=parseFloat(e.target.value);render();}));
  main.querySelectorAll('[data-kind="intensity"]').forEach(el=>el.addEventListener('change',e=>{const p=POLICIES[e.target.dataset.pol];if(p)p.intensity=parseFloat(e.target.value);render();}));
  main.querySelectorAll('[data-kind="tier"]').forEach(el=>el.addEventListener('click',e=>{const p=POLICIES[e.target.dataset.pol],i=+e.target.dataset.i;if(!p||i===p.tierIndex)return;p.tierIndex=i;render();}));
  main.querySelectorAll('[data-kind="toggle"]').forEach(el=>el.addEventListener('click',e=>{const p=POLICIES[e.currentTarget.dataset.pol];if(p)p.enabled=!p.enabled;render();}));
  // agency funding
  main.querySelectorAll('[data-agency]').forEach(el=>el.addEventListener('change',e=>{
    const a=AGENCIES[e.target.dataset.agency];
    if(a)a.funding=parseFloat(e.target.value);render();}));
  // agency harvest level
  main.querySelectorAll('[data-agency-log]').forEach(el=>el.addEventListener('change',e=>{
    const a=AGENCIES[e.target.dataset.agencyLog];
    if(a)a.logging=parseFloat(e.target.value);render();}));
  // land use preset
  main.querySelectorAll('[data-landuse]').forEach(el=>el.addEventListener('change',e=>{
    const i=parseInt(e.target.value); if(i===LANDUSE.index)return;
    LANDUSE.index=i; render();}));
  // allocation channels — rebalance others to keep shares summing to 1
  main.querySelectorAll('[data-alloc]').forEach(el=>el.addEventListener('change',e=>{
    const p=POLICIES[e.target.dataset.alloc], ci=+e.target.dataset.ch, nv=parseFloat(e.target.value);
    const others=p.channels.filter((_,i)=>i!==ci), oldOther=others.reduce((s,c)=>s+c.share,0);
    const rem=1-nv;
    if(oldOther>0)others.forEach(c=>c.share=c.share/oldOther*rem);
    else others.forEach(c=>c.share=rem/others.length);
    p.channels[ci].share=nv;
    render();}));
}

/* ---- motion helpers: tween numbers so changes are felt, not snapped ---- */
const _prevVals={};
function tweenNum(el, key, to, opts={}){
  if(!el)return;
  const from = _prevVals[key]!==undefined ? _prevVals[key] : to;
  _prevVals[key]=to;
  const dur=opts.dur||650, dp=opts.dp||0, pre=opts.pre||"", suf=opts.suf||"";
  if(Math.abs(to-from)<Math.pow(10,-dp)/2 || dur<=0){ el.textContent=pre+to.toFixed(dp)+suf; return; }
  // pulse color on change
  el.classList.remove("val-up","val-down");
  void el.offsetWidth;                       // restart animation
  el.classList.add(to>=from?"val-up":"val-down");
  const t0=performance.now();
  const tick=(now)=>{
    const p=Math.min(1,(now-t0)/dur);
    const e=1-Math.pow(1-p,3);               // ease-out cubic
    el.textContent=pre+(from+(to-from)*e).toFixed(dp)+suf;
    if(p<1)requestAnimationFrame(tick);
    else el.textContent=pre+to.toFixed(dp)+suf;
  };
  requestAnimationFrame(tick);
}
