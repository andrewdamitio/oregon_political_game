<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statecraft — Oregon</title>
<style>
  :root{
    --ink:#1c2526;--paper:#f3efe6;--paper-2:#e8e2d4;
    --moss:#3f5e3a;--moss-bright:#6f9c5e;--clay:#b4563a;--gold:#c89b3c;
    --slate-blue:#46637f;--line:#cabfa8;--good:#4f7a43;--bad:#b4563a;--warn:#c89b3c;
    --font-display:"Hoefler Text","Iowan Old Style","Palatino Linotype",Georgia,serif;
    --font-body:"Inter","Helvetica Neue",Arial,sans-serif;
    --font-data:"IBM Plex Mono","SFMono-Regular",Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:14px;line-height:1.45}
  h1,h2,h3{font-family:var(--font-display);font-weight:600;margin:0}
  .mono{font-family:var(--font-data)}
  header{background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:20}
  header .brand{display:flex;align-items:baseline;gap:12px}
  header .brand h1{font-size:20px;letter-spacing:.5px}
  header .brand .state{font-family:var(--font-data);font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:2px}
  .hud{display:flex;gap:20px;align-items:center}
  .hud .stat{text-align:right}
  .hud .stat .label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#9aa3a0}
  .hud .stat .val{font-family:var(--font-data);font-size:16px;font-weight:600}
  .val.gold{color:var(--gold)} .val.blue{color:#9fc0e0}
  .turnbtn{background:var(--gold);color:var(--ink);border:none;font-family:var(--font-display);font-size:15px;font-weight:600;padding:9px 20px;cursor:pointer;border-radius:2px}
  .turnbtn:hover{background:#dcae4a}
  .wrap{display:grid;grid-template-columns:168px 224px 1fr 300px;min-height:calc(100vh - 58px);position:relative;transition:grid-template-columns .22s ease}
  .wrap.novoters{grid-template-columns:168px 0px 1fr 300px}
  .wrap.novoters.collapsed{grid-template-columns:168px 0px 1fr 0px}
  .wrap.novoters .vpanel{padding:0;border-right:none;overflow:hidden;min-width:0}
  .wrap.novoters .vpanel>*{display:none}
  .wrap.collapsed{grid-template-columns:168px 224px 1fr 0px}
  nav.rail{background:var(--paper-2);border-right:1px solid var(--line);padding:14px 0}
  .vpanel{background:var(--paper);border-right:1px solid var(--line);padding:16px 14px;overflow-y:auto;overflow-x:hidden}
  .vpanel h3{margin:0 0 2px}
  .vpanel-sub{font-size:10.5px;color:#8a8270;margin-bottom:12px;line-height:1.4}
  nav.rail button{display:block;width:100%;text-align:left;background:none;border:none;padding:9px 18px;font-family:var(--font-body);font-size:13px;cursor:pointer;color:var(--ink);border-left:3px solid transparent}
  nav.rail button:hover{background:var(--paper)}
  nav.rail button.active{border-left-color:var(--moss);background:var(--paper);font-weight:600}
  nav.rail .railhdr{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#8a8270;padding:14px 18px 4px}
  .railbloc{display:flex;justify-content:space-between;align-items:center;padding:4px 18px;cursor:pointer;font-size:11px}
  .railbloc:hover{background:var(--paper-2)}
  .rbname{color:#4a463c;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
  .rbpct{font-family:var(--font-data);font-size:10.5px;font-weight:600;flex:none;margin-left:6px}
  .vbloc{padding:6px 6px;border-radius:4px;cursor:pointer;transition:background .1s;margin-bottom:2px}
  .vbloc:hover{background:var(--paper-2)}
  .vbloc-top{display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-bottom:3px}
  .vbloc-name{font-size:11.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vbloc-pct{font-family:var(--font-data);font-size:11px;font-weight:700;flex:none}
  .vbloc-bar{position:relative;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
  .vbloc-bar i{display:block;height:100%;border-radius:3px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .vbloc-bar .vbloc-mid{position:absolute;left:50%;top:-1px;width:1px;height:7px;background:rgba(28,37,38,.25)}
  main{padding:20px 26px;overflow-y:auto;min-width:0}
  #aside{background:var(--paper-2);border-left:1px solid var(--line);padding:16px;overflow-y:auto;overflow-x:hidden}
  .wrap.collapsed #aside{padding:16px 0;border-left:none}
  .wrap.collapsed #aside>*{display:none}
  #asideToggle{position:absolute;top:8px;right:300px;z-index:15;width:22px;height:30px;border:1px solid var(--line);border-right:none;background:var(--paper-2);color:#6b6557;cursor:pointer;border-radius:3px 0 0 3px;font-size:14px;line-height:1;transition:right .22s ease}
  #asideToggle:hover{background:var(--paper);color:var(--ink)}
  .wrap.collapsed #asideToggle{right:0;border-radius:3px 0 0 3px}
  .sectionhdr{font-family:var(--font-display);font-size:22px;margin-bottom:2px}
  .sectionsub{color:#6b6557;font-size:12px;margin-bottom:18px}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .mcard{background:var(--paper-2);border:1px solid var(--line);border-radius:3px;padding:12px 14px}
  .mcard .mname{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#6b6557}
  .mcard .mval{font-family:var(--font-data);font-size:26px;font-weight:600;margin:2px 0}
  .mcard .mreal{font-size:10px;color:#8a8270}
  .bar{height:6px;background:var(--paper);border-radius:3px;overflow:hidden;margin-top:6px}
  .bar i{display:block;height:100%;background:var(--moss)}
  .trend{font-family:var(--font-data);font-size:11px;margin-left:6px}
  .trend.up{color:var(--good)} .trend.down{color:var(--bad)} .trend.flat{color:#8a8270}
  .pgroup{margin-bottom:24px}
  .pgroup h3{font-size:15px;border-bottom:1px solid var(--line);padding-bottom:5px;margin-bottom:10px}
  .policy{background:var(--paper-2);border:1px solid var(--line);border-radius:3px;padding:11px 14px;margin-bottom:9px}
  .policy .ptop{display:flex;justify-content:space-between;align-items:center}
  .policy .pname{font-weight:600}
  .policy .pcost{font-family:var(--font-data);font-size:12px}
  .pcost.spend{color:var(--clay)} .pcost.rev{color:var(--good)}
  .policy .pdesc{font-size:11px;color:#6b6557;margin-top:2px}
  .pctl{margin-top:9px;display:flex;align-items:center;gap:10px}
  input[type=range]{flex:1;accent-color:var(--moss)}
  .tiers{display:flex;gap:5px;flex-wrap:wrap}
  .tier{padding:4px 10px;border:1px solid var(--line);border-radius:2px;cursor:pointer;font-size:12px;background:var(--paper)}
  .tier.on{background:var(--moss);color:var(--paper);border-color:var(--moss)}
  .toggle{width:42px;height:22px;border-radius:11px;background:var(--line);position:relative;cursor:pointer;flex:none}
  .toggle.on{background:var(--moss)}
  .toggle i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--paper);transition:left .15s}
  .toggle.on i{left:22px}
  .capcost{font-family:var(--font-data);font-size:11px;color:var(--gold)}
  .bloc{background:var(--paper-2);border:1px solid var(--line);border-radius:3px;padding:12px 14px;margin-bottom:10px}
  .bloc .btop{display:flex;justify-content:space-between;align-items:baseline}
  .bloc .bname{font-weight:600}
  .bloc .bsize{font-family:var(--font-data);font-size:11px;color:#6b6557}
  .approve{display:flex;align-items:center;gap:8px;margin-top:7px}
  .approve .abar{flex:1;height:14px;background:var(--paper);border-radius:7px;overflow:hidden}
  .approve .abar i{display:block;height:100%}
  .approve .apct{font-family:var(--font-data);font-size:13px;font-weight:600;width:42px;text-align:right}
  aside h3{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:#6b6557;margin-bottom:10px}
  .sit{border-left:3px solid var(--line);padding:8px 10px;margin-bottom:9px;background:var(--paper)}
  .sit.good{border-left-color:var(--good)} .sit.bad{border-left-color:var(--bad)}
  .sit-link{cursor:pointer;transition:transform .1s}
  .sit-link:hover{transform:translateX(2px)}
  .sage{font-family:var(--font-data);font-size:9px;color:#8a8270;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
  .nmbar{display:flex;align-items:center;gap:6px}
  .nmend{font-family:var(--font-data);font-size:13px;color:#8a8270}
  .nmtrack{flex:1;height:8px;background:linear-gradient(90deg,var(--clay),#d8cdb5,var(--good));border-radius:4px;position:relative}
  .nmtrack i{position:absolute;top:-3px;width:4px;height:14px;background:var(--ink);border-radius:2px;transform:translateX(-50%);transition:left .3s}
  .sit .sname{font-weight:600;font-size:13px}
  .sit .sdesc{font-size:11px;color:#6b6557;margin-top:2px}
  .empty{font-size:12px;color:#8a8270;font-style:italic}
  .log{font-family:var(--font-data);font-size:11px;color:#6b6557;border-top:1px dashed var(--line);padding-top:4px;margin-top:4px}
  .termbar{height:5px;background:var(--paper-2);border-radius:3px;margin-top:6px;overflow:hidden}
  .termbar i{display:block;height:100%;background:var(--slate-blue)}
  .modal{position:fixed;inset:0;background:rgba(28,37,38,.82);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal .card{background:var(--paper);max-width:520px;width:90%;padding:28px 30px;border-top:4px solid var(--gold);border-radius:3px}
  .modal h2{font-size:26px;margin-bottom:6px}
  .dilemma-icon{font-size:42px;line-height:1;margin-bottom:6px}
  .dilemma-text{font-size:14px;color:#4a463c;line-height:1.55;margin:10px 0 18px}
  .dilemma-opts{display:flex;flex-direction:column;gap:10px}
  .dilemma-opt{text-align:left;background:var(--paper-2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:3px;padding:12px 14px;cursor:pointer;transition:background .12s;color:var(--ink) !important}
  .dilemma-opt:hover{background:#efe9da}
  .do-label{display:block;font-weight:600;font-size:13px;color:var(--ink)}
  .do-sub{display:block;font-size:11.5px;color:#4a463c;margin-top:3px}
  .do-label{display:block;font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--ink)}
  .do-sub{display:block;font-size:12px;color:#6b6557;margin-top:3px}
  .dilemma-foot{font-size:11px;color:#8a8270;font-style:italic;margin-top:16px}
  .splash-choice{font-size:14px;color:#4a463c;margin:8px 0 16px;padding:8px 12px;background:var(--paper-2);border-radius:3px}
  .splash-label{font-family:var(--font-display);font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a8270;margin-bottom:8px}
  .splash-fx{display:flex;flex-direction:column;gap:5px}
  .splash-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:6px 10px;border-radius:3px;background:var(--paper-2);border-left:3px solid var(--line)}
  .splash-row.pos{border-left-color:var(--good)}
  .splash-row.neg{border-left-color:var(--clay)}
  .srow-who{font-size:12.5px;color:var(--ink)}
  .srow-tag{font-size:10px;color:#8a8270;text-transform:uppercase;letter-spacing:.5px}
  .srow-val{font-family:var(--font-data);font-size:13px;font-weight:600}
  .splash-row.pos .srow-val{color:var(--good)}
  .splash-row.neg .srow-val{color:var(--clay)}
  .splash-foot{font-size:11px;color:#8a8270;font-style:italic;margin-top:14px}
  .splash-ok{margin-top:16px;width:100%;background:var(--gold);border:none;color:var(--paper);padding:11px;border-radius:3px;font-family:var(--font-display);font-size:14px;cursor:pointer}
  .splash-ok:hover{filter:brightness(1.05)}
  .focusgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:22px}
  .focuscard{background:var(--paper-2);border:1px solid var(--line);border-radius:4px;padding:12px 13px}
  .focushead{font-size:13px;color:var(--ink);margin-bottom:2px}
  .focussub{font-size:10px;color:#8a8270;margin-bottom:9px;text-transform:capitalize}
  .focuslegend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;padding:8px 12px;background:var(--paper-2);border:1px solid var(--line);border-radius:4px}
  .fl-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#6b6557}
  .fl-item i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .focusrow{display:flex;align-items:center;gap:8px;font-size:10.5px;color:#4a463c;margin:4px 0;cursor:pointer}
  .fr-name{flex:0 0 88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fr-bar{flex:1;height:7px;background:var(--line);border-radius:3px;overflow:hidden;min-width:30px}
  .fr-bar i{height:100%;border-radius:3px;display:block;min-width:3px;transition:width .4s ease}
  .focusrow:hover .fr-name{color:var(--ink);font-weight:600}
  .modal .res{font-family:var(--font-data);font-size:15px;margin:14px 0}
  .modal .win{color:var(--good)} .modal .lose{color:var(--bad)}
  .modal button:not(.dilemma-opt){margin-top:16px;background:var(--ink);color:var(--paper);border:none;padding:10px 22px;font-family:var(--font-display);font-size:15px;cursor:pointer;border-radius:2px}
  .hidden{display:none}
  .ledger{margin-bottom:11px}
  .lrow{display:flex;justify-content:space-between;align-items:baseline}
  .lname{font-size:13px;font-weight:600}
  .lamt{font-family:var(--font-data);font-size:13px;font-weight:600}
  .lamt.good{color:var(--good)} .lamt.spend{color:var(--clay)}
  .lbar{height:5px;background:var(--paper-2);border-radius:3px;overflow:hidden;margin:3px 0}
  .lbar i{display:block;height:100%}
  .lnote{font-size:10px;color:#8a8270}
  .ltotal{display:flex;justify-content:space-between;font-family:var(--font-display);font-size:15px;font-weight:600;border-top:2px solid var(--line);padding-top:8px;margin-top:6px}
  .ltotal .good{color:var(--good)} .ltotal .spend{color:var(--clay)}

  /* metrics strip */
  .mstrip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  /* crisis cards at top of board */
  .crisis-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:20px}
  .crisis-card{border:1px solid var(--line);border-left:4px solid var(--bad);border-radius:4px;padding:10px 12px;background:var(--paper-2);cursor:pointer;transition:transform .1s,box-shadow .1s}
  .crisis-card:hover{transform:translateY(-2px);box-shadow:0 3px 10px rgba(28,37,38,.12)}
  .crisis-card.good{border-left-color:var(--good)}
  .crisis-card.chronic{border-left-color:var(--clay);background:linear-gradient(180deg,rgba(180,86,58,.08),var(--paper-2))}
  .crisis-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
  .crisis-tag{font-family:var(--font-data);font-size:8.5px;letter-spacing:1px;color:var(--clay);font-weight:700}
  .crisis-card.good .crisis-tag{color:var(--good)}
  .crisis-age{font-family:var(--font-data);font-size:9px;color:#8a8270}
  .crisis-name{font-family:var(--font-display);font-size:14px;font-weight:600;margin-bottom:3px}
  .crisis-desc{font-size:11px;color:#6b6557;line-height:1.3}
  .threshline{font-size:11px;color:#6b6557;line-height:1.4}
  /* State of the State indicator panel */
  .sos-panel{background:var(--paper-2);border:1px solid var(--line);border-radius:4px;padding:13px 15px;margin-bottom:20px}
  .sos-title{font-family:var(--font-display);font-size:14px;font-weight:600;margin-bottom:10px}
  .fiscal-panel{background:var(--paper-2);border:1px solid var(--line);border-radius:4px;padding:16px;margin-bottom:22px}
  .fiscal-title{font-family:var(--font-display);font-size:14px;font-weight:600;margin-bottom:12px}
  .fiscal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .fcard{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--slate-blue);border-radius:3px;padding:10px 12px}
  .fname{font-size:11px;color:#6b6557;margin-bottom:4px}
  .fval{font-family:var(--font-data);font-size:19px;font-weight:600;margin-bottom:4px}
  .fnote{font-size:10.5px;color:#8a8270;line-height:1.4}
  .fbar{position:relative;height:8px;background:var(--paper-2);border-radius:4px;margin:6px 0}
  .fbar .fmid{position:absolute;left:50%;top:-2px;width:1px;height:12px;background:var(--line)}
  .fbar i{position:absolute;top:-1px;width:10px;height:10px;border-radius:50%;background:var(--ink);transform:translateX(-50%);transition:left .3s}
  .fbar2{height:8px;background:var(--paper-2);border-radius:4px;margin:6px 0;overflow:hidden}
  .fbar2 i{display:block;height:100%;border-radius:4px;transition:width .3s}
  .striplabel{font-family:var(--font-display);font-size:14px;font-weight:600;margin-bottom:8px}
  .striphint{font-family:var(--font-body);font-size:11px;font-weight:400;color:#8a8270}
  .sos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
  .sos-gauge{cursor:pointer;padding:4px;border-radius:3px;transition:background .1s}
  .sos-gauge:hover{background:var(--paper)}
  .sos-icon{font-size:20px}
  .sos-name{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#6b6557;margin:2px 0 5px}
  .sos-track{height:8px;background:var(--paper);border-radius:4px;overflow:hidden}
  .sos-fill{height:100%;border-radius:4px;transition:width .3s}
  .sos-val{font-family:var(--font-data);font-size:16px;font-weight:600;margin-top:4px}
  .crisis-fix{font-size:10px;color:var(--moss);margin-top:6px;font-weight:600;line-height:1.3}
  .mchip{flex:1;min-width:120px;background:var(--paper-2);border:1px solid var(--line);border-radius:3px;padding:8px 11px;cursor:pointer;transition:transform .1s}
  .mchip:hover{transform:translateY(-2px);border-color:var(--moss)}
  .mchip-name{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#6b6557}
  .mchip-val{font-family:var(--font-data);font-size:18px;font-weight:600}
  /* quadrants */
  .quads{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  /* ---- D4-style sectioned icon board ---- */
  .board-hint{font-size:11.5px;color:#8a8270;margin-bottom:14px;font-style:italic}
  .secwrap{display:flex;flex-direction:column;gap:18px}
  .secblock{border:1px solid var(--line);border-radius:5px;padding:12px 14px;background:var(--paper-2)}
  .sec-hdr{font-family:var(--font-display);font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .sec-icon{font-size:18px}
  .sec-sub{font-size:9.5px;text-transform:uppercase;letter-spacing:1.2px;color:#a59c84;margin:8px 0 6px}
  .icgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:6px}
  .ic{display:flex;flex-direction:column;align-items:center;text-align:center;padding:6px 3px;border-radius:5px;cursor:pointer;transition:opacity .12s,transform .12s,background .12s}
  .ic:hover{background:var(--paper)}
  .ic-bubble{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;border:2.5px solid var(--line);background:var(--paper);transition:border-color .12s,box-shadow .12s}
  .ic-bubble.stat{border-color:var(--slate-blue)}
  .ic-bubble.pol{border-color:var(--gold)}
  .ic-bubble.agency{border-color:#b9a77a}
  .ic-name{font-size:9.5px;line-height:1.15;margin-top:4px;color:#4a463c;max-width:80px}
  .ic-val{font-family:var(--font-data);font-size:10px;font-weight:600;color:var(--ink);margin-top:2px}
  .ic-dim{opacity:.2}
  .ic-focus .ic-bubble{box-shadow:0 0 0 3px var(--ink);border-color:var(--ink)}
  .ic-good .ic-bubble{border-color:var(--good);box-shadow:0 0 0 2px var(--good)}
  .ic-bad .ic-bubble{border-color:var(--clay);box-shadow:0 0 0 2px var(--clay)}
  .quad{background:var(--paper-2);border:1px solid var(--line);border-top:3px solid var(--qaccent);border-radius:3px;padding:13px 15px}
  .quad-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .quad-icon{font-size:18px}
  .quad-name{font-family:var(--font-display);font-size:15px;font-weight:600}
  .tilegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:9px}
  .tile{background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:9px 5px;text-align:center;cursor:pointer;transition:transform .1s,border-color .1s}
  .tile:hover{transform:translateY(-2px);border-color:var(--qaccent)}
  .tile-icon{font-size:24px;line-height:1.1}
  .tile-name{font-size:9.5px;font-weight:600;margin-top:4px;line-height:1.15}
  .tile-sub{font-family:var(--font-data);font-size:9px;color:#6b6557;margin-top:2px}
  .tile-sub.agency{color:var(--clay)}
  .tile.agency{background:repeating-linear-gradient(45deg,var(--paper),var(--paper) 6px,var(--paper-2) 6px,var(--paper-2) 7px)}
  /* detail page */
  .backbtn{background:none;border:none;color:var(--slate-blue);font-family:var(--font-body);font-size:13px;cursor:pointer;padding:0;margin-bottom:14px}
  .backbtn:hover{text-decoration:underline}
  .detailval{font-family:var(--font-data);font-size:40px;font-weight:600;margin:6px 0 14px}
  .detailrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .pill{font-family:var(--font-data);font-size:11px;padding:4px 9px;border-radius:11px;background:var(--paper-2);border:1px solid var(--line)}
  .pill.rev{color:var(--good)} .pill.spend{color:var(--clay)} .pill.cap{color:var(--gold)} .pill.dom{color:var(--slate-blue)}
  .ctrlbox{background:var(--paper-2);border:1px solid var(--line);border-radius:3px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .repealrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 14px}
  .repealbtn{background:none;border:1px solid var(--clay);color:var(--clay);padding:7px 12px;border-radius:3px;font-family:var(--font-display);font-size:12px;cursor:pointer}
  .repealbtn:hover:not(:disabled){background:var(--clay);color:var(--paper)}
  .repealbtn:disabled{opacity:.4;cursor:not-allowed}
  .repealnote{font-size:11px;color:#8a8270;font-style:italic}
  .phasewrap{display:flex;align-items:center;gap:12px}
  .phasebar{flex:1;height:10px;background:var(--paper);border-radius:5px;position:relative;overflow:visible}
  .phasebar i{display:block;height:100%;background:var(--slate-blue);border-radius:5px;transition:width .3s}
  .phasetgt{position:absolute;top:-3px;width:2px;height:16px;background:var(--ink);transform:translateX(-50%)}
  /* issue web */
  .websearch{margin-bottom:8px;position:relative}
  .websearch::before{content:"🔍";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;opacity:0.65;line-height:1}
  .websearch input{width:100%;box-sizing:border-box;padding:7px 10px 7px 32px;border:2px solid var(--moss);border-radius:6px;background:var(--paper-2);color:var(--ink);font-family:var(--font-body);font-size:13px;font-weight:500}
  .websearch input:focus{outline:none;border-color:var(--slate-blue);box-shadow:0 0 0 3px rgba(74,108,179,0.15)}
  .webwrap{background:var(--paper-2);border:1px solid var(--line);border-radius:4px;overflow:auto}
  #webSvg{width:100%;min-width:760px;display:block}
  .webedge{stroke-opacity:.10;transition:stroke-opacity .12s}
  #webSvg.focus .webedge{stroke-opacity:.04}
  #webSvg .webedge.hot{stroke-opacity:.95 !important;stroke-width:2.8}
  .webnode{cursor:pointer}
  .webnode circle{transition:opacity .12s,stroke-width .12s}
  .webnode.dim{opacity:.18}
  .webnode.searchhit circle{stroke-width:3.8 !important;filter:drop-shadow(0 0 4px currentColor)}
  .boardnode.searchhit .bn-ring{stroke-width:4.5 !important;filter:drop-shadow(0 0 5px currentColor)}
  .weblbl{font-size:8.5px;fill:#6b6557;font-family:var(--font-body)}
  /* ---- graph-style Governing Board (icon tiles as nodes + connections) ---- */
  .boardgraph{background:var(--paper-2);border:1px solid var(--line);border-radius:6px;overflow:auto;margin-top:6px}
  #boardSvg{width:100%;min-width:820px;display:block}
  #boardSvg .webedge{stroke-opacity:.12;transition:stroke-opacity .14s,stroke-width .14s}
  #boardSvg.focus .webedge{stroke-opacity:.04}
  #boardSvg .webedge.hot{stroke-opacity:.92 !important;stroke-width:2.8}
  .boardnode{cursor:pointer}
  .boardnode .bn-ring{transition:opacity .14s,stroke-width .14s,filter .14s; transform-origin:center}
  .boardnode .bn-ico{transition:opacity .14s}
  .boardnode .bn-lbl{font-size:11px;font-weight:600;fill:var(--ink);font-family:var(--font-body)}
  .boardnode .bn-val{font-size:9.5px;fill:#6b6557;font-family:var(--font-data)}
  .boardnode:hover .bn-ring,.boardnode.focus .bn-ring{stroke-width:3.4;filter:drop-shadow(0 2px 5px rgba(28,37,38,.28))}
  .boardnode.dim{opacity:.2}
  .boardnode.dim .bn-lbl,.boardnode.dim .bn-val{opacity:0}
  .boardnode.nbgood .bn-ring{stroke:var(--good) !important;stroke-width:3.4;filter:drop-shadow(0 0 5px rgba(74,123,86,.45))}
  .boardnode.nbbad .bn-ring{stroke:var(--clay) !important;stroke-width:3.4;filter:drop-shadow(0 0 5px rgba(176,106,74,.45))}
  .boardnode.nbneutral .bn-ring{stroke:var(--slate-blue) !important;stroke-width:3.2}
  .boardnode.focus .bn-ring{stroke-width:3.8}
  .bn-hub{font-family:var(--font-display);font-size:15px;font-weight:700;fill:var(--ink);opacity:.13;letter-spacing:.5px;text-transform:uppercase}
  .bn-divider{stroke:var(--line);stroke-width:1.5;stroke-opacity:.5;stroke-dasharray:3 6}
  .boardlegend{display:flex;flex-wrap:wrap;gap:16px;margin:2px 0 8px;padding:8px 12px;background:var(--paper-2);border:1px solid var(--line);border-radius:5px}
  .blg{display:flex;align-items:center;gap:6px;font-size:11px;color:#6b6557}
  .blg svg{flex:none}
  /* key-metrics priority header above the board graph */
  .keystat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:8px;margin:4px 0 10px}
  .keystat{display:flex;align-items:center;gap:9px;background:var(--paper-2);border:1px solid var(--line);border-left-width:4px;border-radius:5px;padding:8px 11px;cursor:pointer;transition:transform .1s,box-shadow .1s}
  .keystat:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(28,37,38,.12)}
  .keystat.kgood{border-left-color:var(--good)}
  .keystat.kbad{border-left-color:var(--clay)}
  .ks-ico{font-size:22px;line-height:1}
  .ks-label{font-size:10.5px;color:#8a8270;text-transform:uppercase;letter-spacing:.4px;font-family:var(--font-display)}
  .ks-val{font-family:var(--font-data);font-size:16px;font-weight:600;color:var(--ink);margin-top:1px}
  .chartbox{background:var(--paper-2);border:1px solid var(--line);border-radius:3px;padding:12px 14px;margin-bottom:14px}
  .charttitle{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#6b6557;margin-bottom:6px}
  .spark{width:100%;height:auto;display:block}
  .sparklbl{font-family:var(--font-data);font-size:11px;fill:#6b6557}
  .sparkaxis{font-family:var(--font-data);font-size:9px;fill:#8a8270}
  .sparkmark{font-size:10px;fill:#4a463c}
  .chartnote{font-size:10.5px;color:#8a8270;font-style:italic;margin-top:6px}
  .detailtop{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
  .undobtn{background:none;border:1px solid var(--clay);color:var(--clay);padding:6px 12px;border-radius:3px;font-size:12px;cursor:pointer;font-family:var(--font-display)}
  .undobtn:hover{background:var(--clay);color:var(--paper)}
  .pendbanner{background:#f3ecd9;border:1px solid var(--gold);border-radius:3px;padding:8px 12px;font-size:12px;color:#4a463c;margin-bottom:14px}
  .polsec{margin-bottom:8px}
  .polsec-hdr{width:100%;text-align:left;background:var(--paper-2);border:1px solid var(--line);border-radius:4px;padding:11px 14px;font-family:var(--font-display);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--ink)}
  .polsec-hdr:hover{background:#efe9da}
  .polsec-caret{width:14px;color:#8a8270}
  .polsec-count{margin-left:auto;font-family:var(--font-data);font-size:12px;color:#8a8270;background:var(--paper);border-radius:10px;padding:1px 9px}
  .polsec .catgrid{margin-top:8px}
  .vcat-label{font-family:var(--font-display);font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:#a59c84;margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:4px}
  .campgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
  .campbloc{border:1px solid var(--line);border-radius:5px;padding:9px 11px;background:var(--paper-2)}
  .cbtop{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:600;margin-bottom:6px}
  .cbtop .bsize{font-family:var(--font-data);font-size:11px;color:#8a8270;font-weight:400}
  .campctl{display:flex;align-items:center;gap:12px;justify-content:center}
  .campminus,.campplus{width:28px;height:28px;border-radius:4px;border:1px solid var(--clay);background:none;color:var(--clay);font-size:16px;cursor:pointer;line-height:1}
  .campminus:disabled,.campplus:disabled{opacity:.3;cursor:default}
  .campplus{border-color:var(--good);color:var(--good)}
  .campval{font-family:var(--font-data);font-size:16px;min-width:18px;text-align:center}
  .promgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px}
  .promcard{border:1px solid var(--line);border-radius:5px;padding:10px 12px;cursor:pointer;background:var(--paper-2);transition:all .12s}
  .promcard:hover{border-color:var(--gold)}
  .promon{background:#eef5e9;border-color:var(--good)}
  .promlabel{font-size:13px;font-weight:600;margin-bottom:4px}
  .promblocs{font-size:11px;color:#8a8270}
  .campfoot{margin-top:18px;text-align:center}
  /* ---- ground game (persistent campaign) ---- */
  .energybar{display:flex;align-items:center;gap:12px;background:var(--paper-2);border:1px solid var(--line);border-radius:6px;padding:10px 14px;margin:6px 0}
  .energy-label{font-size:12px;color:var(--ink);font-weight:600}
  .energy-pips{display:flex;gap:4px;flex:1}
  .energy-pips i{width:22px;height:10px;border-radius:2px;background:var(--line);display:block}
  .energy-pips i.on{background:var(--gold)}
  .energy-num{font-family:var(--font-data);font-size:13px;font-weight:700;color:var(--ink)}
  .campgrid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px}
  .cbloc2{border:1px solid var(--line);border-radius:6px;padding:10px 11px;background:var(--paper-2)}
  .cb2-top{display:flex;justify-content:space-between;align-items:baseline;gap:6px}
  .cb2-name{font-size:12.5px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cb2-appr{font-family:var(--font-data);font-size:12px;font-weight:700;flex:none}
  .cb2-meta{font-size:10px;color:#8a8270;margin:2px 0 8px}
  .cb2-fat{color:var(--clay);font-style:italic}
  .cb2-acts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .cb2-btn{display:flex;flex-direction:column;align-items:center;gap:1px;border:1px solid var(--line);background:var(--paper);border-radius:4px;padding:5px 4px;cursor:pointer;transition:all .1s}
  .cb2-btn:hover:not(:disabled){border-color:var(--gold);transform:translateY(-1px)}
  .cb2-btn:disabled{opacity:.4;cursor:not-allowed}
  .cb2-btn.persuade:hover:not(:disabled){border-color:var(--slate-blue)}
  .cb2-btn.mobilize:hover:not(:disabled){border-color:var(--moss)}
  .cb2-kind{font-size:10.5px;font-weight:600;color:#4a463c}
  .cb2-odds{font-family:var(--font-data);font-size:13px;font-weight:700;color:var(--ink)}
  .cb2-boosts{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .cb2-boost{font-size:9.5px;font-family:var(--font-data);padding:2px 6px;border-radius:3px;background:#eef5e9;color:var(--moss);font-weight:600}
  .camplog{display:flex;flex-direction:column;gap:3px}
  .camplog-row{font-size:11px;padding:5px 10px;border-radius:3px;border-left:3px solid}
  .camplog-row.ok{background:#eef5e9;border-left-color:var(--moss);color:#3a5a40}
  .camplog-row.fail{background:#f6e9e4;border-left-color:var(--clay);color:#8a4a32}
  .prom-status{font-size:9.5px;margin-top:5px;font-weight:600}
  .prom-status.met{color:var(--moss)}
  .prom-status.unmet{color:var(--clay)}
  .prom-status.partial{color:#a07820}
  .prom-criteria{margin-top:6px;display:flex;flex-direction:column;gap:2px}
  .prom-criterion{font-size:10px;padding:2px 0;display:flex;align-items:baseline;gap:4px}
  .crit-met{color:var(--moss)}
  .crit-unmet{color:#9a9080}
  .reportcard{max-width:680px}
  .rhead h2{margin:0 0 2px}
  .rgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 22px;margin:14px 0}
  .rrow{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid var(--line)}
  .rlabel{flex:1;font-size:13px;color:var(--ink)}
  .rval{font-family:var(--font-data);font-size:13px;color:#6b6557}
  .rdelta{font-family:var(--font-data);font-size:12px;font-weight:600;min-width:62px;text-align:right}
  .rdelta.good{color:var(--good)}
  .rdelta.bad{color:var(--bad)}
  .rdelta.flat{color:#a59c84;font-weight:400}
  .rcols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}
  .rsection{background:var(--paper-2);border:1px solid var(--line);border-radius:6px;padding:10px 13px;margin-top:10px}
  .rsec-h{font-family:var(--font-display);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#8a8270;margin-bottom:7px}
  .revent{font-size:12.5px;padding:3px 0;color:var(--ink)}
  .rforecast{font-size:13px;color:var(--ink);line-height:1.5}
  .rskip{display:flex;align-items:center;gap:7px;font-size:12px;color:#8a8270;margin:16px 0 4px;cursor:pointer}
  #reportContinue{margin-top:8px}
  .hudrate{font-family:var(--font-data);font-size:10px;color:var(--moss);font-weight:400;opacity:.8;margin-left:1px}
  /* ---- motion: real animations, not just pop-ups ---- */
  @keyframes modalIn{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes backdropIn{from{opacity:0}to{opacity:1}}
  @keyframes valuePulseUp{0%{color:var(--good);text-shadow:0 0 8px rgba(74,123,86,.5)}100%{}}
  @keyframes valuePulseDown{0%{color:var(--clay);text-shadow:0 0 8px rgba(176,106,74,.5)}100%{}}
  @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes floatUp{0%{opacity:0;transform:translateY(4px)}15%{opacity:1}100%{opacity:0;transform:translateY(-18px)}}
  @keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(28,37,38,.0)}30%{box-shadow:0 0 0 4px rgba(74,123,86,.45)}100%{box-shadow:0 0 0 0 rgba(74,123,86,0)}}
  @keyframes edgeFlow{to{stroke-dashoffset:-12}}
  .modal:not(.hidden){animation:backdropIn .18s ease}
  .modal:not(.hidden) .card{animation:modalIn .26s cubic-bezier(.2,.8,.2,1)}
  .val-up{animation:valuePulseUp .9s ease-out}
  .val-down{animation:valuePulseDown .9s ease-out}
  .pulse-good{animation:ringPulse .8s ease-out}
  .floatlbl{position:absolute;font-family:var(--font-data);font-size:12px;font-weight:700;pointer-events:none;z-index:30;animation:floatUp 1.1s ease-out forwards}
  .reveal>*{animation:cardIn .32s ease both}
  .ic-bubble.stat,.ic-bubble.pol,.ic-bubble.agency{transition:border-color .12s,box-shadow .12s,transform .12s}
  .sparkempty{font-size:12px;color:#8a8270;font-style:italic;padding:8px 0}
  /* catalog */
  .catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .catcard{background:var(--paper-2);border:1px solid var(--line);border-left:4px solid var(--qaccent);border-radius:3px;padding:14px 16px;display:flex;flex-direction:column}
  .cat-top{display:flex;gap:10px;align-items:center;margin-bottom:8px}
  .cat-icon{font-size:28px}
  .cat-name{font-weight:600;font-size:14px}
  .cat-dom{font-size:10px;color:#6b6557}
  .cat-desc{font-size:12px;color:#6b6557;flex:1;margin-bottom:10px}
  .cat-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .enactbtn{background:var(--moss);color:var(--paper);border:none;padding:8px;border-radius:2px;font-family:var(--font-display);font-size:13px;cursor:pointer}
  .enactbtn:hover{background:var(--moss-bright)}
  .enactbtn:disabled{background:var(--line);color:#8a8270;cursor:not-allowed}
  /* effects breakdown */
  .ebsection{margin-top:16px}
  .ebgroup-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#6b6557;margin:14px 0 6px}
  .ebgroup{background:var(--paper-2);border:1px solid var(--line);border-radius:3px;padding:9px 12px}
  .ebnote{font-size:12px;color:#8a8270;font-style:italic;margin:6px 0}
  .ebrow{display:flex;align-items:center;gap:8px;padding:3px 0}
  .eblabel{font-size:11px;width:150px;flex:none;color:#3a3a36;line-height:1.2}
  .ebtrack{flex:1;height:12px;background:var(--paper);border-radius:6px;position:relative;overflow:hidden}
  .ebtrack::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)}
  .ebfill{position:absolute;top:0;bottom:0;border-radius:3px;min-width:1px}
  .ebval{font-family:var(--font-data);font-size:11px;width:74px;text-align:right;flex:none}
  .ebtoggle{background:none;border:none;color:var(--slate-blue);font-family:var(--font-body);font-size:12px;cursor:pointer;padding:6px 0;text-align:left}
  .ebtoggle:hover{text-decoration:underline}
  .cat-eb{margin-bottom:8px}
  .cat-eb .eblabel{width:120px}
  .cat-eb .ebval{width:64px}
  .eblink{color:var(--slate-blue);cursor:pointer;text-decoration:none}
  .eblink:hover{text-decoration:underline}
  .bloc-link{cursor:pointer;transition:transform .1s,border-color .1s}
  .bloc-link:hover{transform:translateY(-2px);border-color:var(--slate-blue)}
  /* allocation channels */
  .allocbox{background:var(--paper-2);border:1px solid var(--line);border-radius:3px;padding:10px 14px;margin-bottom:14px}
  .allocrow{display:flex;align-items:center;gap:10px;padding:5px 0}
  .alloc-icon{font-size:18px;width:22px;text-align:center}
  .alloc-name{font-size:12px;width:130px}
  .allocrow input[type=range]{flex:1}
  .alloc-pct{width:42px;text-align:right}
  /* land use presets */
  .presetrow{display:flex;justify-content:space-between;gap:4px}
  .presetlbl{font-size:9.5px;color:#8a8270;flex:1;text-align:center;line-height:1.2}
  .presetlbl.on{color:var(--moss);font-weight:700}
  /* voter sensitivities */
  .bsens{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
  .stag{font-family:var(--font-data);font-size:9.5px;padding:2px 7px;border-radius:9px;background:var(--paper);border:1px solid var(--line);color:#6b6557}
  .stag.pos{border-color:var(--good);color:var(--good)}
  .stag.neg{border-color:var(--clay);color:var(--clay)}
  .stag.inst{border-color:var(--slate-blue);color:var(--slate-blue)}

  /* ===================== MOBILE / NARROW SCREENS ===================== */
  @media (max-width:820px){
    header{flex-wrap:wrap;gap:8px;padding:8px 12px}
    header .brand h1{font-size:17px}
    .hud{gap:12px;flex-wrap:wrap;width:100%;justify-content:space-between}
    .hud .stat{text-align:left}
    .hud .stat .val{font-size:14px}
    .turnbtn{flex:1;min-width:120px;padding:10px}

    /* single column: nav strip on top, main full width, aside as drawer */
    .wrap, .wrap.collapsed{display:flex;flex-direction:column;grid-template-columns:none}
    nav.rail{display:flex;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);padding:0;-webkit-overflow-scrolling:touch}
    nav.rail .railhdr{display:none}
    .railbloc{display:none}
    nav.rail button{width:auto;white-space:nowrap;border-left:none;border-bottom:3px solid transparent;padding:12px 16px;flex:none}
    nav.rail button.active{border-left:none;border-bottom-color:var(--moss)}
    main{padding:16px 16px 80px;width:100%}

    /* voter panel: a collapsible horizontal scroll strip under the nav on mobile */
    .vpanel{border-right:none;border-bottom:1px solid var(--line);padding:10px 12px;max-height:none}
    .wrap.novoters .vpanel{max-height:0;padding:0;border-bottom:none;overflow:hidden}
    .vpanel h3{font-size:14px;display:inline-block;margin-right:8px}
    .vpanel-sub{display:none}
    #railVoters{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding-bottom:2px}
    .vbloc{width:auto;border:1px solid var(--line);background:var(--paper)}

    /* right info aside becomes a right-side overlay drawer, hidden by default on mobile */
    #aside{position:fixed;top:0;right:0;height:100vh;width:84%;max-width:320px;z-index:40;
      box-shadow:-4px 0 18px rgba(28,37,38,.25);transform:translateX(100%);transition:transform .25s ease;
      padding:18px;border-left:1px solid var(--line)}
    .wrap.drawer-open #aside{transform:translateX(0)}
    .wrap.drawer-open #aside>*{display:block}
    /* dim backdrop when drawer open */
    .drawer-scrim{position:fixed;inset:0;background:rgba(28,37,38,.45);z-index:35;display:none}
    .wrap.drawer-open .drawer-scrim{display:block}

    /* toggle button: fixed floating tab on the right edge */
    #asideToggle{position:fixed;top:auto;bottom:78px;right:0;width:38px;height:44px;font-size:18px;
      border:1px solid var(--line);border-right:none;background:var(--gold);color:var(--ink);
      border-radius:6px 0 0 6px;box-shadow:-2px 2px 8px rgba(28,37,38,.2);z-index:45}
    .wrap.drawer-open #asideToggle{right:min(84%,320px)}

    /* board quadrants stack on mobile */
    .quads{grid-template-columns:1fr !important}
    .catgrid{grid-template-columns:1fr !important}
    .mstrip{gap:6px}
    .mchip{min-width:calc(50% - 6px);flex:none}
  }
</style>
</head>
<body>
<header>
  <div class="brand"><h1>Statecraft</h1><span class="state" id="stateName">Oregon</span></div>
  <div class="hud">
    <div class="stat"><div class="label">Turn</div><div class="val" id="hudTurn">Q1 2025</div></div>
    <div class="stat"><div class="label">Approval</div><div class="val" id="hudApproval">50%</div></div>
    <div class="stat"><div class="label">Pol. Capital</div><div class="val gold" id="hudCapital">40</div></div>
    <div class="stat"><div class="label">Gen. Fund Bal.</div><div class="val blue" id="hudBudget">+0.0B</div></div>
    <button class="turnbtn" id="endTurn">End Quarter ▸</button>
  </div>
</header>

<div class="wrap" id="wrap">
  <nav class="rail">
    <div class="railhdr">Govern</div>
    <button class="active" data-view="board">Governing Board</button>
    <button data-view="policies">New Policies</button>
    <button data-view="voters">Voters</button>
    <button data-view="budget">Budget</button>
    <button data-view="campaign">Campaign</button>
  </nav>
  <aside class="vpanel">
    <h3>Voter Blocs</h3>
    <div class="vpanel-sub">Approval by group — click any for detail</div>
    <div id="railVoters"></div>
  </aside>
  <main id="main"></main>
  <button id="asideToggle" title="Show/hide panel">‹</button>
  <aside id="aside">
    <h3>Term Progress</h3>
    <div id="termInfo" class="mono" style="font-size:12px"></div>
    <div class="termbar"><i id="termFill" style="width:0%"></i></div>
    <h3 style="margin-top:20px">National Political Mood</h3>
    <div class="nmbar" id="nmBlock" style="cursor:pointer"><span class="nmend">−</span><div class="nmtrack"><i id="nmFill"></i></div><span class="nmend">+</span></div>
    <div id="nmLabel" class="mono" style="font-size:11px;text-align:center;margin-top:3px;cursor:pointer">Neutral (0.0)</div>
    <h3 style="margin-top:20px">Economic Climate</h3>
    <div class="nmbar"><span class="nmend">▼</span><div class="nmtrack"><i id="ecoFill"></i></div><span class="nmend">▲</span></div>
    <div id="ecoLabel" class="mono" style="font-size:11px;text-align:center;margin-top:3px">Steady</div>
    <h3 style="margin-top:20px">Active Situations</h3>
    <div id="sitList"><div class="empty">No active situations.</div></div>
    <h3 style="margin-top:20px">Quarter Log</h3>
    <div id="logList"></div>
  </aside>
  <div class="drawer-scrim" id="drawerScrim"></div>
</div>

<div id="electionModal" class="modal hidden"><div class="card" id="electionCard"></div></div>
<div id="reportModal" class="modal hidden"><div class="card reportcard" id="reportCard"></div></div>
<div id="dilemmaModal" class="modal hidden"><div class="card" id="dilemmaCard"></div></div>

<script>
/* =====================================================================
   STATECRAFT — v1
   Data grounded in real Oregon figures (2025-27 biennium).
   Engine: equilibrium-target metric model + inter-metric links +
           situations + simulant approval + elections.
   To re-skin for another state: edit STATE + DATA blocks only.
   ===================================================================== */

const AXES=["economic","social","environment","govSize"]; // -1 left/prog .. +1 right/cons

/* ---------- STATE CONSTANTS (real Oregon data) ----------
   OR Employment Dept: unemployment 5.2% (Feb 2026).
   2025-27 Legislatively Adopted Budget: $37.3B GF + $1.8B Lottery/biennium
   => ~$19.55B/yr GF+Lottery. State School Fund ~$11.4B/biennium. */
const STATE={ name:"Oregon" };

/* ---------- REVENUE BY SOURCE ($B/yr, annualized from 2025-27 biennium) ----------
   General Fund + Lottery ≈ $19.5B/yr. Source: OR Office of Economic Analysis
   Dec 2025 forecast & 2025-27 Legislatively Adopted Budget.
   base = revenue at the policy's DEFAULT setting (rate=1.0 reference).
   linkedPolicy = the policy whose level scales this source (revenue =
   base * level/refLevel). Sources with no linked policy are fixed. */
const REVENUE={
  personalIncome:{name:"Personal Income Tax", base:15.0, linkedPolicy:"incomeTax", refLevel:0.6,
    note:"4.75%–9.9% top marginal (above $125k). ~$30B/biennium — 85%+ of GF; no sales tax"},
  corpIncome:{name:"Corporate Excise/Income Tax", base:1.3, linkedPolicy:null,
    note:"6.6% / 7.6% corporate excise tax; separate from the CAT"},
  corpActivity:{name:"Corporate Activity Tax (CAT)", base:1.25, linkedPolicy:"corpTax", refLevel:0.5,
    note:"0.57% gross-receipts tax over $1M; dedicated to schools (Student Success Act)"},
  federalFunds:{name:"Federal Funds (Medicaid match etc.)", base:6.5, linkedPolicy:null,
    note:"~$43.7B all-funds; Medicaid match dominates. Auto-conformity means federal tax/Medicaid changes hit fast."},
  lottery:{name:"Lottery Funds", base:0.9, linkedPolicy:null,
    note:"~$1.8B/biennium, incl. video lottery"},
  carbonRevenue:{name:"Climate Program Proceeds", base:0.6, linkedPolicy:"carbonProgram", refLevel:1,
    note:"Allowance proceeds, reinvested"},
  otherGF:{name:"Other GF (estate, misc.)", base:0.45, linkedPolicy:null,
    note:"Estate tax (10–16%), fees. No sales tax"},
  liquorRev:{name:"Liquor Revenue (OLCC)", base:0.30,
    note:"OLCC spirits markup — 56% of net to GF; scales with alcohol control tier. Zero if privatized. Cannabis tax shows under the Cannabis Program policy."},
  timber:{name:"State Forest Timber Receipts", base:0.25, linkedPolicy:null,
    note:"Logging revenue — scales with Forestry harvest rate"},
  salesTaxRev:{name:"Sales Tax", base:6.0, linkedPolicy:"salesTax", refLevel:0.5,
    note:"None today — Oregon has no sales tax. Revenue only if enabled."},
  estateRev:{name:"Estate Tax", base:0.42, linkedPolicy:"estateTax", refLevel:0.625,
    note:"$422.8M FY2025 — $1M exemption, lowest threshold in the nation (10–16% graduated)"},
  cannabisRev:{name:"Cannabis Tax", base:0.27, linkedPolicy:"cannabis", refLevel:0.6,
    note:"Measure 91 retail tax — funded Measure 110 treatment networks"},
  policyMisc:{name:"Other Policy Revenue", base:0, linkedPolicy:null,
    note:"Licensing & retained funds from enacted laws (psilocybin, kicker retention, carbon tax…)"},
  vehicleFees:{name:"Vehicle Registration Fees", base:0.6, linkedPolicy:"vehicleReg", refLevel:0.5,
    note:"Registration & title fees — funds roads (ODOT)"},
  gasTaxRev:{name:"Gas Tax", base:0.9, linkedPolicy:"gasTax", refLevel:0.5,
    note:"40¢/gal, constitutionally dedicated to highways"},
  evFeeRev:{name:"EV Road Usage Charge", base:0.10, linkedPolicy:"evFee", refLevel:0.5,
    note:"Per-mile charge on electric vehicles (expanded OReGO). Offsets gas-tax erosion as fleet electrifies."},
};

/* ---------- SPENDING BY PROGRAM AREA ($B/yr) ----------
   base = mandatory/baseline cost not driven by a player policy.
   policies[] = discretionary policies that add to this area's total
   (their costs are pulled from policyNetCost). Human Services is the
   largest area (OHA Medicaid + DHS); K-12 is the State School Fund. */
const SPENDING={
  humanServices:{name:"Human Services (caseloads)", base:1.0, agencies:["dhs","oha"],
    policies:["homelessServices","behavioralHealth"],
    note:"Caseload growth on top of DHS + OHA agency budgets"},
  k12:{name:"K-12 Education", base:0.0, agencies:[], policies:["stateSchoolFund"],
    note:"State School Fund ~$11.4B/biennium"},
  higherEd:{name:"Higher Education", base:0.4, agencies:[], policies:["universities","stateColleges","communityColleges","higherEd","oregonPromise"],
    note:"Universities, regional colleges, community colleges, need-based aid"},
  publicSafety:{name:"Public Safety & Justice", base:0.2, agencies:["corrections","judiciary"],
    policies:["policing","prisonRegimen","measure11"], note:"State Police, Corrections, Courts, prison operations"},
  housing:{name:"Housing & Community Dev.", base:0.0, agencies:["ohcs"], policies:["affordableHousing","rentStabilization","officeConversion"],
    note:"OHCS agency budget + housing production policies"},
  economy:{name:"Economic & Workforce Dev.", base:0.45, agencies:["revenueDept","treasury"],
    policies:["rndTaxCredit","digitalGov","downtownRevitalization","cannabis"],
    note:"Business Oregon, fiscal agencies, OLCC"},
  natResources:{name:"Natural Resources & Environment", base:0.1, agencies:["odot","forestry","deq","oprd"],
    policies:["wildfireResilience","transitInvestment","bottleBill","cleanFuels","forestCarbon","outdoorRec","forestPractices","modeSplit","gasTax","vehicleReg","evFee","waterRights","renewablePortfolio"],
    note:"DEQ, Transportation, Forestry, Parks, wildfire fund"},
  social:{name:"Social Programs", base:0.0, agencies:[], policies:["abortion","childcareSubsidy","sexWorkDecrim","gunStorage","universalMeals","rankedChoice","rightToRepair","psilocybin","paidLeave","motorVoter","middleHousing","deathWithDignity","minWageTiers"],
    note:"Reproductive health, childcare, civil programs"},
  debtAdmin:{name:"Debt Service & Administration", base:0.85, agencies:[], policies:["kickerReform"],
    note:"Bond debt service, central government"},
};

const METRICS={
  unemployment:{name:"Unemployment", icon:"💼", value:5.2, baseline:5.2, eq:5.5, min:1.5,max:16,
    inertia:0.2, invert:true, fmt:"pctRaw", realNote:"OR actual: 5.2% (Feb 2026)"},
  education:{name:"Educational Attainment", icon:"🎓", value:64, baseline:64, eq:55, min:0,max:100,
    inertia:0.15, fmt:"pct", realNote:"~64% HS+some college index"},
  violentCrime:{name:"Violent Crime", icon:"🚨", value:38, baseline:38, eq:44, min:0,max:100,
    inertia:0.18, invert:true, realNote:"Assaults, robberies — drives fear and headlines"},
  propertyCrime:{name:"Property Crime", icon:"🔓", value:52, baseline:52, eq:58, min:0,max:100,
    inertia:0.2, invert:true, realNote:"Property crime elevated post-2020"},
  homelessness:{name:"Homelessness", icon:"🏚️", value:62, baseline:62, eq:66, min:0,max:100,
    inertia:0.18, invert:true, realNote:"OR among highest per-capita unsheltered"},
  health:{name:"Public Health", icon:"❤️", value:63, baseline:63, eq:58, min:0,max:100,
    inertia:0.15, realNote:"Behavioral health capacity strained"},
  environment:{name:"Environmental Quality", icon:"🌲", value:72, baseline:72, eq:68, min:0,max:100,
    inertia:0.12, realNote:"Strong baseline; wildfire pressure"},
  gdp:{name:"GDP Growth Rate (annualized)", icon:"📈", value:2.1, baseline:2.1, eq:2.0, min:-4,max:7,
    inertia:0.25, fmt:"pctRaw", realNote:"~2% real growth"},
  inequality:{name:"Inequality", icon:"⚖️", value:55, baseline:55, eq:60, min:0,max:100,
    inertia:0.14, invert:true, realNote:"Income gap; higher = more unequal"},
  gasPrice:{name:"Gas Price", icon:"⛽", value:3.95, baseline:3.95, eq:3.55, min:2.5,max:7,
    inertia:0.35, invert:true, fmt:"usd", realNote:"$/gal regular — taxes, mandates, oil markets"},
  transitShare:{name:"Bike/Transit Commute Share", icon:"🚲", value:8, baseline:8, eq:5, min:0,max:40,
    inertia:0.12, fmt:"pct", realNote:"% commuting by transit, bike, or foot — blunts gas-price pain"},
  taxBurden:{name:"Overall Tax Burden", icon:"🧾", value:38, baseline:38, eq:12, min:0,max:100,
    inertia:0.4, invert:true, realNote:"Composite of ALL state taxes — every tax feeds this"},
  disposableIncome:{name:"Disposable Income", icon:"💵", value:52, baseline:52, eq:55, min:0,max:100,
    inertia:0.2, realNote:"Household income after taxes, gas, and essentials"},
  // --- agency-driven rates ---
  collectionRate:{name:"Tax Collection Rate", icon:"🏛️", value:96, baseline:96, eq:88, min:75,max:99,
    inertia:0.3, fmt:"pct", agencyDriven:true, realNote:"Share of owed tax actually collected"},
  loggingRate:{name:"Logging Rate", icon:"🪵", value:40, baseline:40, eq:30, min:0,max:100,
    inertia:0.3, realNote:"Combined state and private forest harvest intensity; driven by economy, regulation, and agency funding"},
  incarcerationRate:{name:"Incarceration Rate", icon:"⛓️", value:50, baseline:50, eq:40, min:10,max:95,
    inertia:0.3, invert:false, agencyDriven:true, realNote:"Custody capacity & enforcement"},
  // --- behavioral / outcome statistics (Stage: deeper simulation) ---
  eduOutcomes:{name:"K-12 Proficiency", icon:"📖", value:43, baseline:43, eq:40, min:0,max:100,
    inertia:0.1, fmt:"pct", realNote:"Share proficient in reading/math — OR below national average; the QUALITY of schooling vs. mere attainment"},
  behavioralHealth:{name:"Behavioral Health", icon:"🧠", value:46, baseline:46, eq:43, min:0,max:100,
    inertia:0.14, realNote:"Mental-health & addiction treatment capacity — chronically strained"},
  obesity:{name:"Obesity Rate", icon:"🍔", value:30, baseline:30, eq:32, min:8,max:55,
    inertia:0.09, invert:true, fmt:"pctRaw", realNote:"~30% adult obesity; slow-moving, diet & activity driven"},
  alcoholUse:{name:"Alcohol Consumption", icon:"🍺", value:55, baseline:55, eq:56, min:0,max:100,
    inertia:0.12, invert:true, realNote:"OR drinks above the national average; excessive use a leading risk factor"},
  drugUse:{name:"Drug Use Rate", icon:"💊", value:60, baseline:60, eq:62, min:0,max:100,
    inertia:0.14, invert:true, realNote:"Fentanyl/meth prevalence — among the worst nationally after the M110 era"},
  evAdoption:{name:"EV Adoption", icon:"🔌", value:15, baseline:15, eq:13, min:0,max:100,
    inertia:0.1, fmt:"pct", realNote:"% of new-car sales electric — OR follows California's ZEV mandate"},
  psychBeds:{name:"Psychiatric Bed Capacity", icon:"🛏️", value:32, baseline:32, eq:28, min:0,max:100,
    inertia:0.12, realNote:"State psychiatric & crisis-stabilization beds per capita — Oregon is chronically among the most bed-starved states, a binding constraint on commitment, the Oregon State Hospital, and getting people off the street into care"},
};

/* ============================================================
   INDICATORS — derived "State of the State" gauges. Each is computed
   every turn from metrics + active situations via derive(), eased toward
   that target for momentum, then feeds back into metrics via feedback()
   on the NEXT turn. They are not directly settable — they're a read on
   how the state is perceived, and they have real downstream consequences.
   value 0..100, higher = better.
   ============================================================ */
const INDICATORS={
  downtown:{name:"Downtown Perception", icon:"🏙️", value:30,
    desc:"How safe, clean, and vibrant Oregon's downtown cores (esp. Portland) are perceived to be. Battered by homelessness, crime, and addiction; lifted as those recover.",
    derive:()=>{
      let v=50;
      v-=(METRICS.homelessness.value-50)*0.75;
      v-=(METRICS.propertyCrime.value-52)*0.40;
      v-=(METRICS.violentCrime.value-40)*0.30;
      v+=(METRICS.health.value-60)*0.25;
      if(GAME.activeSituations.crimeWave)v-=8;
      if(GAME.activeSituations.homelessEmergency)v-=6;
      if(GAME.activeSituations.addictionCrisis)v-=18;
      v+=(METRICS.psychBeds.value-32)*0.12;
      v+=indPolicyBoost("downtown")+sitIndicatorPush("downtown");
      return clamp(v,0,100);
    },
    drivers:()=>[
      {name:"⊕ baseline",v:50,base:true},
      // metric drivers (always shown)
      {name:METRICS.homelessness.icon+" Homelessness",v:-(METRICS.homelessness.value-50)*0.75,link:"m_homelessness"},
      {name:METRICS.propertyCrime.icon+" Property Crime",v:-(METRICS.propertyCrime.value-52)*0.40,link:"m_propertyCrime"},
      {name:METRICS.violentCrime.icon+" Violent Crime",v:-(METRICS.violentCrime.value-40)*0.30,link:"m_violentCrime"},
      {name:METRICS.health.icon+" Public Health",v:(METRICS.health.value-60)*0.25,link:"m_health"},
      {name:"🛏️ Psychiatric Beds",v:(METRICS.psychBeds.value-32)*0.12,link:"m_psychBeds"},
      // policy levers (shown when contributing)
      ...(POLICIES.campingPolicy&&Math.abs(effLevelOf(POLICIES.campingPolicy)*16)>0.05?[{name:"⛺ Camping Enforcement",v:effLevelOf(POLICIES.campingPolicy)*16,link:"p_campingPolicy"}]:[]),
      ...(POLICIES.civilCommitment&&effLevelOf(POLICIES.civilCommitment)*5>0.05?[{name:"⚖️ Civil Commitment Ease",v:effLevelOf(POLICIES.civilCommitment)*5,link:"p_civilCommitment"}]:[]),
      ...(POLICIES.homelessServices&&effLevelOf(POLICIES.homelessServices)*8>0.05?[{name:"🏘️ Homeless Services",v:effLevelOf(POLICIES.homelessServices)*8,link:"p_homelessServices"}]:[]),
      ...(POLICIES.officeConversion&&effLevelOf(POLICIES.officeConversion)*7>0.05?[{name:"🏢 Office-to-Housing Conversion",v:effLevelOf(POLICIES.officeConversion)*7,link:"p_officeConversion"}]:[]),
      ...(POLICIES.downtownRevitalization&&effLevelOf(POLICIES.downtownRevitalization)*12>0.05?[{name:"🏙️ Downtown Revitalization Fund",v:effLevelOf(POLICIES.downtownRevitalization)*12,link:"p_downtownRevitalization"}]:[]),
      ...(POLICIES.bottleBill&&effLevelOf(POLICIES.bottleBill)*2>0.05?[{name:"♻️ Bottle Bill",v:effLevelOf(POLICIES.bottleBill)*2,link:"p_bottleBill"}]:[]),
      ...(POLICIES.modeSplit&&effLevelOf(POLICIES.modeSplit)*4>0.05?[{name:"🚌 Active Transportation Mix",v:effLevelOf(POLICIES.modeSplit)*4,link:"p_modeSplit"}]:[]),
      // agency lever
      ...((AGENCIES.ohcs&&AGENCIES.ohcs.funding>0.01)?[{name:"🏚️ "+AGENCIES.ohcs.name,v:(AGENCIES.ohcs.funding??0.5)*3,link:"a_ohcs"}]:[]),
      // hardcoded situation penalties
      ...(GAME.activeSituations.addictionCrisis?[{name:"⚠ Addiction & Overdose Crisis",v:-18,link:"sit_addictionCrisis"}]:[]),
      ...(GAME.activeSituations.crimeWave?[{name:"⚠ Crime Wave",v:-8,link:"sit_crimeWave"}]:[]),
      ...(GAME.activeSituations.homelessEmergency?[{name:"⚠ Homelessness Emergency",v:-6,link:"sit_homelessEmergency"}]:[]),
      // indicator-push situations
      ...(GAME.activeSituations.propertySpike?[{name:"⚠ Property Crime Spike",v:-6*sitSeverity("propertySpike"),link:"sit_propertySpike"}]:[]),
      ...(GAME.activeSituations.doomLoop?[{name:"⚠ Portland Doom Loop",v:-5*sitSeverity("doomLoop"),link:"sit_doomLoop"}]:[]),
      ...(GAME.activeSituations.cascadiaQuake?[{name:"⚠ Cascadia Earthquake",v:-8,link:"sit_cascadiaQuake"}]:[]),
    ],
    feedback:{gdp:0.030, businessClimate:0.018}}, // at starting downtown~18: GDP-0.96, businessClimate-0.58 drag
  inMigration:{name:"In-Migration Rate", icon:"🚚", value:50,
    desc:"Net flow of people and talent into Oregon. Driven by jobs, affordability, environment, and downtown vitality. Feeds the labor force and growth.",
    derive:()=>{
      let v=50;
      v+=(55-METRICS.unemployment.value*6.5)*0.20;     // strong job market draws people
      v-=(METRICS.homelessness.value-50)*0.30;          // unaffordability/visible crisis repels
      v+=(METRICS.environment.value-60)*0.20;
      v+=(INDICATORS.downtown.value-50)*0.30;           // downtown vitality attracts
      v+=NATIONAL_MOOD.value*0.4;
      v+=indPolicyBoost("inMigration")+sitIndicatorPush("inMigration");
      return clamp(v,0,100);
    },
    drivers:()=>[
      {name:"⊕ baseline",v:50,base:true},
      {name:METRICS.unemployment.icon+" Job Market (unemployment)",v:(55-METRICS.unemployment.value*6.5)*0.20,link:"m_unemployment"},
      {name:METRICS.homelessness.icon+" Homelessness / affordability",v:-(METRICS.homelessness.value-50)*0.30,link:"m_homelessness"},
      {name:METRICS.environment.icon+" Environment",v:(METRICS.environment.value-60)*0.20,link:"m_environment"},
      {name:INDICATORS.downtown.icon+" Downtown Vitality",v:(INDICATORS.downtown.value-50)*0.30,link:"i_downtown"},
      {name:"🇺🇸 National Mood",v:NATIONAL_MOOD.value*0.4,link:"nationalMood"},
    ],
    feedback:{gdp:0.015, unemployment:0.01}},          // newcomers grow economy, slight labor-supply effect
  businessClimate:{name:"Business Climate", icon:"📈", value:44,
    desc:"How attractive Oregon is to employers and investment. Shaped by taxes, crime, talent inflow, and downtown perception. Drives GDP and hiring.",
    derive:()=>{
      let v=48;
      v-=(METRICS.taxBurden.value-32)*0.60;              // Oregon's stacked taxes hit margins hard
      v-=(METRICS.gasPrice.value-3.6)*4;                 // fuel costs squeeze margins
      v-=(METRICS.propertyCrime.value-52)*0.22;
      v-=(METRICS.violentCrime.value-40)*0.15;
      v+=(INDICATORS.inMigration.value-50)*0.25;         // talent availability
      v+=(METRICS.education.value-60)*0.20;
      if(GAME.activeSituations.techBoom)v+=10;
      if(GAME.activeSituations.recession)v-=10;
      if(GAME.activeSituations.taxRevolt)v-=6;
      v+=indPolicyBoost("businessClimate")+sitIndicatorPush("businessClimate");
      return clamp(v,0,100);
    },
    drivers:()=>[
      {name:"⊕ baseline",v:48,base:true},
      {name:METRICS.taxBurden.icon+" Tax Burden",v:-(METRICS.taxBurden.value-32)*0.60,link:"m_taxBurden"},
      {name:METRICS.gasPrice.icon+" Gas Price",v:-(METRICS.gasPrice.value-3.6)*4,link:"m_gasPrice"},
      {name:METRICS.propertyCrime.icon+" Property Crime",v:-(METRICS.propertyCrime.value-52)*0.22,link:"m_propertyCrime"},
      {name:METRICS.violentCrime.icon+" Violent Crime",v:-(METRICS.violentCrime.value-40)*0.15,link:"m_violentCrime"},
      {name:INDICATORS.inMigration.icon+" Talent (in-migration)",v:(INDICATORS.inMigration.value-50)*0.25,link:"i_inMigration"},

/* sum of indicatorEffects[id] across all enacted policies (scaled by level)
   AND agencies (scaled by funding) */
function indPolicyBoost(indId){
  let b=0;
  for(const fid in GAME.fading){
    const fp=GAME.fading[fid].pol;
    if(fp.indicatorEffects&&fp.indicatorEffects[indId]!==undefined)b+=fp.indicatorEffects[indId]*effLevelOf(fp);
  }
  for(const pid in POLICIES){
    const p=POLICIES[pid];
    if(p.indicatorEffects&&p.indicatorEffects[indId]!==undefined)
      b+=p.indicatorEffects[indId]*effLevelOf(p);
    // tier policies carry per-tier indicator effects
    if(p.mechanic==="tier"&&p.tierIndicatorEffects&&p.tierIndicatorEffects[p.tierIndex]&&p.tierIndicatorEffects[p.tierIndex][indId]!==undefined)
      b+=p.tierIndicatorEffects[p.tierIndex][indId];
  }
  for(const aid in AGENCIES){
    const a=AGENCIES[aid];
    if(a.indicatorEffects&&a.indicatorEffects[indId]!==undefined)
      b+=a.indicatorEffects[indId]*(a.funding??0.5);
    if(a.loggingIndicatorEffects&&a.loggingIndicatorEffects[indId]!==undefined)
      b+=a.loggingIndicatorEffects[indId]*(a.logging??0.5);
  }
  return b;
}
/* sum of indicatorEffect[id] across ACTIVE situations — crises push indicators */
function sitIndicatorPush(indId){
  let b=0;
  for(const sid in GAME.activeSituations){
    const s=SITUATIONS[sid];
    if(s&&s.indicatorEffect&&s.indicatorEffect[indId]!==undefined)b+=s.indicatorEffect[indId]*sitSeverity(sid);
  }
  return b;
}
/* Auto-generate driver rows for an indicator from all indPolicyBoost/sitIndicatorPush
   sources. Used by the detail renderer to surface invisible policy connections. */
function indBoostDrivers(indId){
  const out=[];
  for(const pid in POLICIES){
    const p=POLICIES[pid]; let v=0;
    if(p.indicatorEffects&&p.indicatorEffects[indId]!==undefined) v+=p.indicatorEffects[indId]*effLevelOf(p);
    if(p.mechanic==="tier"&&p.tierIndicatorEffects&&p.tierIndicatorEffects[p.tierIndex]&&p.tierIndicatorEffects[p.tierIndex][indId]!==undefined)
      v+=p.tierIndicatorEffects[p.tierIndex][indId];
    if(Math.abs(v)>0.3) out.push({name:(p.icon?p.icon+' ':'')+p.name, v, link:"p_"+pid});
  }
  for(const fid in GAME.fading){
    const fp=GAME.fading[fid].pol; let v=0;
    if(fp.indicatorEffects&&fp.indicatorEffects[indId]!==undefined) v+=fp.indicatorEffects[indId]*effLevelOf(fp);
    if(Math.abs(v)>0.3) out.push({name:(fp.icon?fp.icon+' ':'')+fp.name+' ↓', v, link:"p_"+fid});
  }
  for(const aid in AGENCIES){
    const a=AGENCIES[aid]; let v=0;
    if(a.indicatorEffects&&a.indicatorEffects[indId]!==undefined) v+=a.indicatorEffects[indId]*(a.funding??0.5);
    if(a.loggingIndicatorEffects&&a.loggingIndicatorEffects[indId]!==undefined) v+=a.loggingIndicatorEffects[indId]*(a.logging??0.5);
    if(Math.abs(v)>0.3) out.push({name:(a.icon?a.icon+' ':'')+a.name, v, link:"a_"+aid});
  }
  for(const sid in GAME.activeSituations){
    const s=SITUATIONS[sid];
    if(s&&s.indicatorEffect&&s.indicatorEffect[indId]!==undefined){
      const v=s.indicatorEffect[indId]*sitSeverity(sid);
      if(Math.abs(v)>0.3) out.push({name:(s.kind==="good"?"✦ ":"⚠ ")+s.name, v, link:"sit_"+sid});
    }
  }
  return out;
}
/* EFFICACY MULTIPLIER from digitization: 0.7x at digitization 0, 1.0x at ~55,
   up to ~1.15x at 100. Low state capacity weakens every policy's outcomes. */
function efficacy(){
  return clamp(0.7 + (INDICATORS.digitization.value/100)*0.5, 0.6, 1.2);
}

function sectionFor(id){
  if(SECTION_OF[id])return SECTION_OF[id];
  // fallback by domain
  const o=POLICIES[id]||CATALOG[id]||AGENCIES[id];
  if(o){const d=o.domain;return d==="economy"?"economy":d==="social"?"laworder":d==="eduHealth"?"pubservices":"environment";}
  return "economy";
}
/* unified statistic registry: metrics + indicators, no distinction.
   Returns {key, stat, isIndicator} for everything the player sees. */
function allStats(){
  const out=[];
  for(const k in METRICS)out.push({key:k, stat:METRICS[k], ind:false});
  for(const k in INDICATORS)out.push({key:k, stat:INDICATORS[k], ind:true});
  return out;
}
function statByKey(k){return METRICS[k]?{stat:METRICS[k],ind:false}:(INDICATORS[k]?{stat:INDICATORS[k],ind:true}:null);}

function maybeFireDilemma(){
  if(GAME.pendingDilemma)return;
  if(GAME.turn-(GAME.lastDilemmaTurn||-9)<3)return;
  let best=null,bestScore=0;
  for(const id in DILEMMAS){
    if(GAME.dilemmaCooldown[id]&&GAME.turn-GAME.dilemmaCooldown[id]<16)continue;
    // every dilemma carries a small ambient chance (D4's _random_ floor)
    // on top of its condition-driven influence
    const sc=clamp(0.18+DILEMMAS[id].influence(),0,1)+Math.random()*0.45;
    if(sc>bestScore){bestScore=sc;best=id;}
  }
  if(best&&bestScore>0.7){
    GAME.pendingDilemma=best;
    GAME.dilemmaCooldown[best]=GAME.turn;
    GAME.lastDilemmaTurn=GAME.turn;
    GAME.log.push("❖ Dilemma: "+DILEMMAS[best].title);
  }
}
function resolveDilemma(optIndex){
  const d=DILEMMAS[GAME.pendingDilemma];
  if(!d)return;
  // snapshot to capture what the choice does
  const grudgeBefore=GAME.grudges.length;
  const capBefore=GAME.capital;
  d.options[optIndex].apply();
  // collect the effects this choice just created
  const newGrudges=GAME.grudges.slice(grudgeBefore);
  const capDelta=GAME.capital-capBefore;
  const fx=[];
  for(const g of newGrudges){
    let who=g.label||"Effect", dir=g.value>0?"+":"";
    if(g.target.startsWith("v_")&&SIMULANTS[g.target.slice(2)])who=SIMULANTS[g.target.slice(2)].name;
    else if(g.target.startsWith("m_")&&METRICS[g.target.slice(2)])who=METRICS[g.target.slice(2)].name;
    else if(g.target.startsWith("i_")&&INDICATORS[g.target.slice(2)])who=INDICATORS[g.target.slice(2)].name;
    fx.push({who, val:g.value, label:g.label, kind:g.target.split("_")[0]});
  }
  if(Math.abs(capDelta)>0.01)fx.push({who:"Political Capital", val:capDelta, kind:"cap"});
  GAME.log.push("❖ "+d.title+" — chose: "+d.options[optIndex].label);
  GAME.lastDilemmaResult={title:d.title, icon:d.icon, choice:d.options[optIndex].label, fx};
  GAME.pendingDilemma=null;
  render();
}

    if(gr.target.startsWith("m_")){const k=gr.target.slice(2);if(METRICS[k])METRICS[k].value=clamp(METRICS[k].value+gr.value*METRICS[k].inertia,METRICS[k].min,METRICS[k].max);}
    else if(gr.target.startsWith("i_")){const k=gr.target.slice(2);if(INDICATORS[k])INDICATORS[k].value=clamp(INDICATORS[k].value+gr.value,0,100);}
    gr.value*=gr.decay;
  }
  GAME.grudges=GAME.grudges.filter(gr=>Math.abs(gr.value)>0.08);
}
/* ============================================================
   CYNICISM & COMPLACENCY — D4's anti-landslide pressure, per group.
   Cynicism: rises on policy U-turns (repealing a law a group backed,
   doubly so if you enacted it recently); fades if not re-provoked.
   Complacency: groups kept very happy take it for granted ("what have
   you done for me lately"); its ceiling RISES each term you serve,
   so long-term incumbents face ever-grumpier core supporters.
   ============================================================ */
function tickCynComp(){
  for(const sid in SIMULANTS){
    const sim=SIMULANTS[sid];
    sim.cynicism=(sim.cynicism||0)*0.92;
    if(sim.cynicism<0.1)sim.cynicism=0;
    const cap=6+2*(GAME.term-1);
    if(sim.approval>70)sim.complacency=Math.min(cap,(sim.complacency||0)+0.4);
    else if(sim.approval<55)sim.complacency=Math.max(0,(sim.complacency||0)-0.5);
  }
}
/* Lasting conditions tilt the makeup of the electorate toward a new mix.
   Returns multiplicative nudges per bloc (e.g. -0.18 = that bloc's target
   share is pulled 18% lower). These are LEVEL shifts: while the condition
   holds, the family converges to the tilted mix and stays there; when it
   lifts, it converges back. Entrenchment keeps the transition gradual. */
function ELECTORATE_SHIFT(){
  const sw={};
  const add=(id,v)=>sw[id]=(sw[id]||0)+v;
  // prolonged addiction / overdose / disorder crisis: disillusionment shrinks
  // the progressive left and grows conservatism (the real post-M110 backlash)
  let disorder=0;
  if(GAME.activeSituations.addictionCrisis)disorder+=1;
  if(GAME.activeSituations.homelessEmergency)disorder+=0.7;
  disorder+=clamp((METRICS.drugUse.value-62)/30,0,1)*0.6;
  disorder+=clamp((INDICATORS.downtown.value<40?(40-INDICATORS.downtown.value):0)/40,0,1)*0.5;
  if(disorder>0){
    add("liberal",-0.38*disorder); add("socialist",-0.46*disorder);
    add("conservative",0.34*disorder); add("moderate",0.14*disorder);
  }
  // strong in-migration + prosperity: newcomers skew young, urban, liberal
  const inflow=clamp((INDICATORS.inMigration.value-55)/30,0,1);
  if(inflow>0){
    add("liberal",0.30*inflow); add("urban",0.32*inflow);
    add("conservative",-0.14*inflow); add("rural",-0.22*inflow);
  }
  // out-migration / decline: the reverse, hollowing out the urban core
  const outflow=clamp((45-INDICATORS.inMigration.value)/30,0,1);
  if(outflow>0){ add("urban",-0.24*outflow); add("rural",0.16*outflow); }
  // sustained high taxes / grievance: grows the anti-tax right
  add("conservative",clamp((INDICATORS.taxGrievance.value-60)/40,0,1)*0.24);
  add("libertarian",clamp((INDICATORS.taxGrievance.value-60)/40,0,1)*0.20);
  // a booming economy reassures the center
  if(GAME.activeSituations.techBoom){ add("moderate",0.12); add("liberal",0.10); }
  return sw;
}
function tickMembership(){
  // global policy-driven deltas
  const delta={};
  for(const id in MEMBERSHIP_DRIVERS)delta[id]=clamp(MEMBERSHIP_DRIVERS[id].f(),-0.35,0.35);
  for(const v of VOTERS){
    // income mobility: adjusted income tracks the economy
    v.adjIncome=clamp(v.innateIncome+(METRICS.disposableIncome.value-52)/200,0.02,0.98);
    let poorT=clamp((0.42-v.adjIncome)*4,0,1), wealthyT=clamp((v.adjIncome-0.62)*4,0,1);
    let middleT=Math.max(0,1-poorT-wealthyT); { const is=poorT+wealthyT+middleT||1; poorT/=is; wealthyT/=is; middleT/=is; }
    // IDEOLOGY (mutually exclusive, sums to 1): score each pole by fit;
    // Moderates absorb the centrist remainder so every voter has exactly one
    // ideology and the five shares total 100% of the electorate.
    const idScore=id=>{const I=SIMULANTS[id].ideology;return Math.max(0.0001,1-(Math.abs(v.econ-I.economic)+Math.abs(v.social-I.social))/2.0);};
    const sharp=x=>Math.pow(Math.max(0,x),3.2);
    let iso=sharp(idScore("socialist")), ili=sharp(idScore("liberal")),
        imo=sharp(idScore("moderate"))*1.15, ico=sharp(idScore("conservative")), ilb=sharp(idScore("libertarian"));
    const isum=iso+ili+imo+ico+ilb||1;
    const idTgt={socialist:iso/isum,liberal:ili/isum,moderate:imo/isum,conservative:ico/isum,libertarian:ilb/isum};
    // HOUSING (mutually exclusive, sums to 1)
    const ownT=clamp((v.adjIncome-0.35)*1.3+(v.age-0.4)*0.5,0,1), rentT=1-ownT;
    // REGION (mutually exclusive, sums to 1): from the voter's urbanity
    let urbT=clamp((v.urban-0.58)*2.6,0,1), rurT=clamp((0.48-v.urban)*2.6,0,1);
    let subT=Math.max(0,1-urbT-rurT); { const rs=urbT+rurT+subT||1; urbT/=rs; rurT/=rs; subT/=rs; }
    const tgt={poor:poorT,middleIncome:middleT,wealthy:wealthyT,
      homeowners:ownT,renters:rentT, urban:urbT,suburban:subT,rural:rurT,
      socialist:idTgt.socialist,liberal:idTgt.liberal,moderate:idTgt.moderate,conservative:idTgt.conservative,libertarian:idTgt.libertarian};
    for(const id in v.m){
      const rate=ENTRENCH[id]||0.08;
      const target=(tgt[id]!==undefined)?tgt[id]:clamp(v.innate[id]+(delta[id]||0),0,1);
      v.m[id]+=(target-v.m[id])*rate;
    }
  }
  // emergent sizes
  for(const id in SIMULANTS){
    let sum=0;for(const v of VOTERS)sum+=v.m[id]||0;
    SIMULANTS[id].size=sum/VOTERS.length;
  }
  // ELECTORATE-MAKEUP SHIFTS: lasting conditions redistribute share WITHIN each
  // mutually-exclusive family toward a new mix (e.g. a long addiction crisis
  // shrinks the progressive left and grows the right). GAME.makeupShift holds a
  // slow-moving state that eases toward the target tilt, so the change is a
  // gradual move to a new level — not a one-off jump or an endless drift — and
  // it reverses when the condition lifts. The family always re-sums to its
  // original total, so 100%-summing is preserved.
  const swing=ELECTORATE_SHIFT();
  GAME.makeupShift=GAME.makeupShift||{};
  // ease every known bloc's shift toward its CURRENT target (0 if the condition
  // has lifted), so the mix moves to a new level and reverses when it clears
  const allBlocs=["socialist","liberal","moderate","conservative","libertarian","urban","suburban","rural","poor","middleIncome","wealthy"];
  for(const id of allBlocs){
    const target=swing[id]||0;
    GAME.makeupShift[id]=(GAME.makeupShift[id]||0)+(target-(GAME.makeupShift[id]||0))*0.06;
    if(Math.abs(GAME.makeupShift[id])<0.002)GAME.makeupShift[id]=0;
  }
  for(const fam of [["socialist","liberal","moderate","conservative","libertarian"],["urban","suburban","rural"],["poor","middleIncome","wealthy"]]){
    let total=0; for(const id of fam)total+=SIMULANTS[id].size;
    if(total<=0)continue;
    // apply tilt: each bloc's share multiplied by (1+shift), then renormalized to the same family total
    let tilted={}, ts=0;
    for(const id of fam){ tilted[id]=Math.max(0,SIMULANTS[id].size*(1+(GAME.makeupShift[id]||0))); ts+=tilted[id]; }
    if(ts>0)for(const id of fam)SIMULANTS[id].size=tilted[id]/ts*total;
  }
}
/* per-voter approval = membership-weighted blend of group approvals */
function tickVoterApproval(){
  for(const v of VOTERS){
    let num=0,den=0;
    for(const id in v.m){const m=v.m[id];if(m>0.04&&SIMULANTS[id]){num+=SIMULANTS[id].approval*m;den+=m;}}
    v.approval=clamp((den>0?num/den:50)+v.bias,0,100);
  }
}
function turnoutProb(v){
  // motor voter reaches the disengaged: bigger boost for low-partisanship, younger voters
  const mvBoost=POLICIES.motorVoter
    ? 0.07*Math.max(0.3, 1-0.6*Math.max(Math.abs(v.econ||0),Math.abs(v.social||0))-0.25*Math.min((v.age||0)/1.5,1))
    : 0;
  const base=0.34+mvBoost+turnoutMobilization();
  // enthusiasm: voters who feel strongly (either way) turn out far more than the indifferent
  return clamp(base+0.55*Math.abs(v.approval-50)/50+v.age*0.18,0.05,0.97);
}
/* system-wide turnout mobilization from civic policy and the political moment.
   Ranked-choice voting and motor-voter lift participation; deep cynicism and
   a sour national mood depress it. Applied on top of each voter's enthusiasm. */
function turnoutMobilization(){
  let m=0;
  if(POLICIES.rankedChoice&&POLICIES.rankedChoice.enabled)m+=0.04;   // RCV modestly lifts turnout
  m+=clamp(NATIONAL_MOOD.value,-4,4)*0.004;                          // national wave
  if(GAME.activeSituations.scandal)m-=0.02;
  return m;
}
/* Motor Voter differential turnout boost per bloc.
   Automatic registration mainly reaches the disengaged — low-turnout groups
   and less partisan voters who never bothered to register. Highly partisan
   blocs already vote at high rates regardless, so they see little gain. */
function motorVoterTurnoutBoost(sid){
  if(!POLICIES.motorVoter||!POLICIES.motorVoter.enabled) return 0;
  const s=SIMULANTS[sid]; if(!s) return 0;
  const headroom=1-(s.turnout||0.5);            // lower baseline turnout = more to gain
  const ideo=s.ideology||{};
  const partisanship=Math.max(
    Math.abs(ideo.economic||0), Math.abs(ideo.social||0),
    Math.abs(ideo.govSize||0), Math.abs(ideo.environment||0));
  return clamp(0.09*headroom*(1-partisanship*0.5), 0.005, 0.055);
}
/* a bloc's effective turnout this cycle: its baseline civic propensity, lifted
   when the bloc is enthusiastic or angry (mobilized) and damped when it's
   demoralized or cynical. This makes turnout per-bloc and policy-responsive. */
function blocTurnout(sid){
  const s=SIMULANTS[sid];
  const intensity=Math.abs(s.approval-50)/50;                        // fired up (for or against)
  let t=s.turnout*(0.8+intensity*0.5)+turnoutMobilization()+motorVoterTurnoutBoost(sid);
  t-=clamp((s.cynicism||0)*0.015,0,0.12);                            // cynics stay home
  return clamp(t,0.05,0.98);
}
/* voting intention: turnout-weighted share of simulated voters above 50 */
function votingIntention(){
  let yes=0,tot=0;
  for(const v of VOTERS){const t=turnoutProb(v);tot+=t;if(v.approval>50)yes+=t;}
  return tot>0?yes/tot*100:50;
}

/* ============================================================
   IDENTITY OVERLAP — voters hold MULTIPLE identities at once.
   Each entry is a correlation 0..1: the share of one identity's
   members who also hold the other. A transit commuter is far more
   likely to also be a Portland progressive than a rural conservative
   — but both overlaps exist. Approval partially bleeds between
   overlapping identities each quarter (shared members carry their
   mood into both groups they belong to).
   ============================================================ */
const OVERLAP={
  // only the OVERLAPPING (non-exclusive) blocs correlate here; ideology,
  // region, income, and housing are mutually-exclusive families set by
  // hard targets in tickMembership, so they're not seeded via overlap.
  blueCollar:{publicUnions:0.3, timber:0.25, motorists:0.2},
  businessClass:{collegeEducated:0.3},
  collegeEducated:{publicUnions:0.2, transitCommuters:0.15},
  students:{transitCommuters:0.35, collegeEducated:0.25},
  timber:{motorists:0.3},
  parents:{homeowners:0.2},
};
/* symmetric lookup of all overlaps for one identity */
function overlapsOf(sid){
  const out={};
  for(const k in (OVERLAP[sid]||{}))out[k]=OVERLAP[sid][k];
  for(const a in OVERLAP)if(OVERLAP[a][sid]!==undefined)out[a]=Math.max(out[a]||0,OVERLAP[a][sid]);
  return out;
}
